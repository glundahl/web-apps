<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English II – The Outsiders &amp; M. Butterfly</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2330;
    --border: #30363d;
    --accent: #d2a8ff;
    --accent2: #a371f7;
    --accent3: #f78166;
    --accent4: #79c0ff;
    --text: #e6edf3;
    --text-muted: #7d8590;
    --text-dim: #484f58;
    --correct: #1a2d4d;
    --correct-border: #d2a8ff;
    --wrong: #4d1a1a;
    --wrong-border: #f78166;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
    border-bottom: 1px solid var(--border);
    padding: 40px 20px 30px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 70% 80% at 50% -20%, rgba(210,168,255,.11) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }
  .header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(24px, 5vw, 42px);
    font-weight: 800;
    line-height: 1.1;
    color: var(--text);
  }
  .header h1 span { color: var(--accent); }
  .header-sub {
    margin-top: 10px;
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 300;
  }
  .pill-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 18px;
  }
  .pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--text-muted);
  }

  /* ── PROGRESS BAR ── */
  .progress-wrap {
    max-width: 760px;
    margin: 24px auto 0;
    padding: 0 20px;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .progress-track {
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent4));
    border-radius: 4px;
    transition: width .4s ease;
    width: 0%;
  }

  /* ── LIVE SCORE CARD ── */
  .score-card {
    max-width: 760px;
    margin: 16px auto 0;
    padding: 0 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .score-item {
    flex: 1;
    min-width: 100px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    text-align: center;
  }
  .score-item .num { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 700; }
  .score-item .lbl { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .score-item.correct .num { color: var(--accent); }
  .score-item.wrong   .num { color: var(--accent3); }
  .score-item.pct     .num { color: var(--accent4); }

  /* ── SECTION TABS ── */
  .tabs {
    max-width: 760px;
    margin: 24px auto 0;
    padding: 0 20px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .tab-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all .2s;
  }
  .tab-btn:hover { border-color: var(--accent); color: var(--text); }
  .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #0d1117; font-weight: 600; }

  /* ── QUIZ AREA ── */
  .quiz-area { max-width: 760px; margin: 20px auto 0; padding: 0 20px; }

  /* ── SECTION HEADER ── */
  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 28px 0 14px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--text-muted);
  }
  .section-header::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .section-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* ── QUESTION CARD ── */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 14px;
    transition: border-color .3s;
    animation: fadeSlide .35s ease both;
  }
  @keyframes fadeSlide {
    from { opacity:0; transform: translateY(12px); }
    to   { opacity:1; transform: translateY(0); }
  }
  .q-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 16px; }
  .q-num {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 8px;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .q-section-label { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 4px; }
  .q-text { font-size: 15px; font-weight: 500; line-height: 1.5; color: var(--text); }

  /* ── OPTIONS ── */
  .options { display: flex; flex-direction: column; gap: 8px; }

  .opt {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    cursor: pointer;
    transition: all .18s;
    font-size: 14px;
    line-height: 1.45;
    color: var(--text);
    text-align: left;
    width: 100%;
    font-family: 'DM Sans', sans-serif;
  }
  .opt:hover:not(:disabled) { border-color: var(--accent); background: rgba(210,168,255,.08); transform: translateX(2px); }
  .opt:disabled { cursor: default; transform: none; }

  .opt-letter {
    flex-shrink: 0;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 11px; font-weight: 700;
    color: var(--text-muted);
    transition: all .18s;
    margin-top: 1px;
  }
  .opt:hover:not(:disabled) .opt-letter { background: var(--accent); color: #0d1117; }

  .opt.correct-pick { background: var(--correct); border-color: var(--correct-border); color: #e2c6ff; }
  .opt.correct-pick .opt-letter { background: var(--accent); color: #0d1117; }
  .opt.wrong-pick { background: var(--wrong); border-color: var(--wrong-border); color: #ffa198; }
  .opt.wrong-pick .opt-letter { background: var(--accent3); color: #fff; }
  .opt.reveal-correct { background: rgba(210,168,255,.08); border-color: rgba(210,168,255,.4); color: #e2c6ff; }
  .opt.reveal-correct .opt-letter { background: rgba(210,168,255,.3); color: var(--accent); }

  /* ── EXPLANATION ── */
  .explanation {
    display: none;
    margin-top: 12px;
    padding: 12px 14px;
    background: rgba(210,168,255,.07);
    border: 1px solid rgba(210,168,255,.2);
    border-radius: var(--radius);
    font-size: 13px;
    color: #c9b3f5;
    line-height: 1.55;
  }
  .explanation.show { display: block; }
  .explanation strong { color: var(--accent); }

  /* ── CONTROLS ── */
  .controls { max-width: 760px; margin: 28px auto 0; padding: 0 20px; display: flex; gap: 10px; flex-wrap: wrap; }
  .btn { padding: 10px 22px; border-radius: var(--radius); border: none; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: .04em; cursor: pointer; transition: all .2s; }
  .btn-primary { background: var(--accent); color: #0d1117; }
  .btn-primary:hover { background: #e2c6ff; transform: translateY(-1px); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); transform: translateY(-1px); }

  /* ── RESULTS ── */
  #results-screen { display: none; max-width: 760px; margin: 30px auto; padding: 0 20px; text-align: center; }
  .results-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px 30px; }
  .results-grade { font-family: 'Syne', sans-serif; font-size: 72px; font-weight: 800; line-height: 1; margin-bottom: 8px; }
  .results-label { font-size: 14px; color: var(--text-muted); margin-bottom: 28px; }
  .results-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 28px; }
  .results-stat { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .results-stat .n { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 700; }
  .results-stat .l { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
  .missed-list { text-align: left; margin-top: 20px; }
  .missed-list h3 { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; color: var(--accent3); margin-bottom: 10px; text-transform: uppercase; letter-spacing: .08em; }
  .missed-item { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; line-height: 1.4; }
  .missed-item span { color: var(--text); }

  @media(max-width:520px){
    .score-item { min-width: 80px; padding: 10px; }
    .score-item .num { font-size: 20px; }
    .q-card { padding: 18px; }
    .opt { font-size: 13px; padding: 10px 12px; }
    .results-grade { font-size: 56px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-label">English II · 2026 Exam Prep</div>
  <h1>The Outsiders &amp; <span>M. Butterfly</span></h1>
  <div class="header-sub">Themes · Characters · Symbols · Literary Devices</div>
  <div class="pill-row">
    <span class="pill">43 Questions</span>
    <span class="pill">Multiple Choice</span>
    <span class="pill">Instant Feedback</span>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-meta">
    <span id="prog-label">0 of 43 answered</span>
    <span id="prog-pct">0%</span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div>
</div>

<div class="score-card">
  <div class="score-item correct"><div class="num" id="sc-correct">0</div><div class="lbl">Correct</div></div>
  <div class="score-item wrong">  <div class="num" id="sc-wrong">0</div>  <div class="lbl">Incorrect</div></div>
  <div class="score-item pct">   <div class="num" id="sc-pct">—</div>   <div class="lbl">Score</div></div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="filterSection('all',this)">All Questions</button>
  <button class="tab-btn" onclick="filterSection('outsiders-bg',this)">Setting &amp; Background</button>
  <button class="tab-btn" onclick="filterSection('outsiders-chars',this)">Characters</button>
  <button class="tab-btn" onclick="filterSection('outsiders-plot',this)">Plot</button>
  <button class="tab-btn" onclick="filterSection('outsiders-themes',this)">Themes &amp; Symbols</button>
  <button class="tab-btn" onclick="filterSection('mb-bg',this)">M. Butterfly Background</button>
  <button class="tab-btn" onclick="filterSection('mb-chars',this)">M. Butterfly Characters</button>
  <button class="tab-btn" onclick="filterSection('mb-themes',this)">M. Butterfly Themes</button>
  <button class="tab-btn" onclick="filterSection('quotes',this)">Quotes</button>
  <button class="tab-btn" onclick="filterSection('comparative',this)">Both Texts</button>
</div>

<div class="quiz-area" id="quiz-area"></div>

<div class="controls">
  <button class="btn btn-primary" onclick="showResults()">See Final Score</button>
  <button class="btn btn-secondary" onclick="resetQuiz()">Reset Quiz</button>
</div>

<div id="results-screen">
  <div class="results-box">
    <div class="results-grade" id="r-grade">—</div>
    <div class="results-label" id="r-label">calculating…</div>
    <div class="results-grid">
      <div class="results-stat"><div class="n" id="r-correct" style="color:var(--accent)">0</div><div class="l">Correct</div></div>
      <div class="results-stat"><div class="n" id="r-wrong"   style="color:var(--accent3)">0</div><div class="l">Incorrect</div></div>
      <div class="results-stat"><div class="n" id="r-skip"    style="color:var(--text-muted)">0</div><div class="l">Skipped</div></div>
    </div>
    <div class="missed-list" id="missed-list"></div>
    <button class="btn btn-primary" style="margin-top:24px;width:100%" onclick="resetQuiz()">Retake Quiz</button>
  </div>
</div>

<script>
const ALL_QUESTIONS = [

/* ══ SETTING & BACKGROUND ══ */
{section:'outsiders-bg', q:"In what city and state is <em>The Outsiders</em> set?",
 opts:[{t:"Chicago, Illinois",correct:false},{t:"Tulsa, Oklahoma",correct:true},{t:"Dallas, Texas",correct:false},{t:"Oklahoma City, Oklahoma",correct:false}],
 explain:"The novel is set in Tulsa, Oklahoma during the 1960s."},

{section:'outsiders-bg', q:"What year was <em>The Outsiders</em> published?",
 opts:[{t:"1967",correct:true},{t:"1970",correct:false},{t:"1964",correct:false},{t:"1965",correct:false}],
 explain:"S. E. Hinton published The Outsiders in 1967."},

{section:'outsiders-bg', q:"Who narrates <em>The Outsiders</em>?",
 opts:[{t:"Johnny Cade",correct:false},{t:"Dally Winston",correct:false},{t:"Sodapop Curtis",correct:false},{t:"Ponyboy Curtis",correct:true}],
 explain:"Ponyboy Curtis narrates the entire novel in first person."},

{section:'outsiders-bg', q:"How does the city of Tulsa directly shape the conflict in <em>The Outsiders</em>?",
 opts:[{t:"Its industrial economy creates job competition between gangs",correct:false},{t:"Its class divisions between the East and West sides produce tension between Greasers and Socs",correct:true},{t:"Its geography isolates the Greasers from any help",correct:false},{t:"Its population size makes anonymity impossible for both groups",correct:false}],
 explain:"Tulsa's geographic and economic class divide — East Side poor vs. West Side wealthy — is the structural source of conflict in the novel."},

/* ══ CHARACTERS ══ */
{section:'outsiders-chars', q:"Which words best describe Ponyboy Curtis?",
 opts:[{t:"Aggressive and street-smart",correct:false},{t:"Intellectual and emotionally sensitive",correct:true},{t:"Cynical and withdrawn",correct:false},{t:"Athletic and ambitious",correct:false}],
 explain:"Ponyboy is the most intellectual and emotionally sensitive member of the Greasers — he loves literature and sunsets, and feels like an outsider even within his own gang."},

{section:'outsiders-chars', q:"What is Johnny Cade's home life like, and how does it shape him?",
 opts:[{t:"He comes from a wealthy family but feels neglected",correct:false},{t:"He is emotionally fragile due to abuse at home, making him vulnerable but deeply loyal",correct:true},{t:"He is carefree because he has no family responsibilities",correct:false},{t:"He is raised by Dally and looks up to him as a father figure",correct:false}],
 explain:"Johnny's abusive home life leaves him emotionally fragile, but also deeply loyal to the Greasers, who are the only family he truly has."},

{section:'outsiders-chars', q:"What heroic act does Johnny Cade perform before his death?",
 opts:[{t:"He saves children from a burning church",correct:true},{t:"He turns himself in to protect Ponyboy from prosecution",correct:false},{t:"He challenges Bob Sheldon to a fair fight",correct:false},{t:"He brokers a peace agreement between the Greasers and Socs",correct:false}],
 explain:"Johnny heroically runs into the burning church to save children trapped inside, sustaining fatal injuries in the process."},

{section:'outsiders-chars', q:"Dally Winston is described as a 'real hood.' What does his reaction to Johnny's death reveal about him?",
 opts:[{t:"He becomes the new leader of the Greasers",correct:false},{t:"He turns himself in to the police to honor Johnny",correct:false},{t:"He is secretly happy because Johnny was holding him back",correct:false},{t:"Beneath his hardened exterior he is deeply vulnerable and loves Johnny",correct:true}],
 explain:"Dally's 'suicide by cop' after Johnny's death reveals that Johnny was the one person he truly cared about — his toughness was a performance masking grief."},

{section:'outsiders-chars', q:"Which character serves as a bridge between the Socs and the Greasers?",
 opts:[{t:"Randy Adderson",correct:false},{t:"Sodapop Curtis",correct:false},{t:"Cherry Valance",correct:true},{t:"Darry Curtis",correct:false}],
 explain:"Cherry Valance is a Soc who genuinely understands and empathizes with both groups."},

{section:'outsiders-chars', q:"Why does Ponyboy feel like an outsider even within his own gang?",
 opts:[{t:"He secretly wants to be a Soc",correct:false},{t:"He is more intellectual and emotional than the typical Greaser stereotype",correct:true},{t:"He refuses to participate in fights",correct:false},{t:"The other Greasers don't trust him",correct:false}],
 explain:"Ponyboy's love of books, movies, and sunsets sets him apart from the tougher Greaser image — he struggles against being reduced to a label."},

/* ══ PLOT ══ */
{section:'outsiders-plot', q:"Why does Johnny kill Bob Sheldon?",
 opts:[{t:"Bob had threatened Darry Curtis earlier that week",correct:false},{t:"Bob was attacking Ponyboy and trying to drown him",correct:true},{t:"Johnny wanted to prove his toughness to the gang",correct:false},{t:"Bob had been spreading rumors about the Greasers",correct:false}],
 explain:"Johnny killed Bob to defend Ponyboy, who was being attacked and drowned at the fountain."},

{section:'outsiders-plot', q:"What do Ponyboy and Johnny do to disguise themselves while hiding at the church?",
 opts:[{t:"They use fake names only",correct:false},{t:"They pretend to be farmhands",correct:false},{t:"They wear Soc clothing",correct:false},{t:"They cut and/or dye their hair",correct:true}],
 explain:"They cut and dye their hair to change their recognizable Greaser look."},

{section:'outsiders-plot', q:"What is the significance of the first and last lines of <em>The Outsiders</em> being identical?",
 opts:[{t:"They are quotes borrowed from Robert Frost",correct:false},{t:"They emphasize Ponyboy's ongoing hatred for the Socs",correct:false},{t:"They reveal the novel is Ponyboy's English essay",correct:true},{t:"They are warnings against joining gangs",correct:false}],
 explain:"The repeated lines reveal that the entire novel is the English assignment Ponyboy wrote about his experiences — the story is his way of processing grief."},

{section:'outsiders-plot', q:"What events mark the climax of <em>The Outsiders</em>?",
 opts:[{t:"The rumble between Greasers and Socs",correct:false},{t:"The church fire rescue",correct:false},{t:"The court hearing for Ponyboy",correct:false},{t:"The deaths of Johnny and Dally",correct:true}],
 explain:"The deaths of Johnny and Dally are the emotional climax that transforms Ponyboy and leads him to write his story."},

{section:'outsiders-plot', q:"Why does Dally Winston commit 'suicide by cop'?",
 opts:[{t:"He was tired of being a Greaser",correct:false},{t:"He wanted to become a martyr for the gang",correct:false},{t:"He was facing a life sentence in prison",correct:false},{t:"He was overwhelmed by the loss of Johnny",correct:true}],
 explain:"Johnny's death breaks Dally. Without Johnny, he has nothing left to live for and deliberately provokes the police."},

/* ══ THEMES & SYMBOLS ══ */
{section:'outsiders-themes', q:"What does the Blue Mustang symbolize to the Greasers?",
 opts:[{t:"A shared love of mechanics and cars",correct:false},{t:"Freedom and the open road",correct:false},{t:"Wealth and impending danger",correct:true},{t:"The possibility of crossing class lines",correct:false}],
 explain:"The Blue Mustang represents Soc wealth, status, and the ever-present threat of danger from the other side of town."},

{section:'outsiders-themes', q:"What does Greaser hair symbolize in the novel?",
 opts:[{t:"Rebellion against parents and school",correct:false},{t:"Identity, pride, and group belonging",correct:true},{t:"A desire to be different from everyone",correct:false},{t:"Loyalty to Dally Winston specifically",correct:false}],
 explain:"The Greasers' long, oiled hair is their most visible symbol of identity and group pride — which is why cutting it feels like such a sacrifice."},

{section:'outsiders-themes', q:"What do sunsets symbolize in <em>The Outsiders</em>?",
 opts:[{t:"The passage of time and inevitable loss",correct:false},{t:"Ponyboy's hope for a better future",correct:false},{t:"Shared humanity between Socs and Greasers",correct:true},{t:"The beauty of Oklahoma that both groups will miss",correct:false}],
 explain:"When Ponyboy and Cherry discover they both appreciate the same sunset, it symbolizes that Socs and Greasers share a common humanity beneath their social labels."},

{section:'outsiders-themes', q:"What does Johnny's 'Stay gold' message mean?",
 opts:[{t:"Stay loyal to the Greasers no matter what",correct:false},{t:"Maintain your innocence and idealism",correct:true},{t:"Never change your physical appearance",correct:false},{t:"Keep your money and possessions safe",correct:false}],
 explain:"'Stay gold' references Robert Frost's poem and urges Ponyboy to preserve his innocence and goodness despite the hardships ahead."},

{section:'outsiders-themes', q:"Which Robert Frost poem does 'Stay gold' reference, and what is its central idea?",
 opts:[{t:'"The Road Not Taken" — that choices define us',correct:false},{t:'"Stopping by Woods on a Snowy Evening" — the pull of darkness',correct:false},{t:'"Nothing Gold Can Stay" — that innocence and beauty are fleeting',correct:true},{t:'"Mending Wall" — that boundaries separate people',correct:false}],
 explain:"'Nothing Gold Can Stay' argues that all things pure and beautiful are temporary — Johnny uses it to urge Ponyboy to hold onto his goodness."},

{section:'outsiders-themes', q:"What does the quote 'Things are rough all over' reveal about the novel's theme?",
 opts:[{t:"That Greasers have it harder than Socs in every way",correct:false},{t:"That violence is unavoidable in Tulsa",correct:false},{t:"That empathy can bridge class divisions because everyone struggles",correct:true},{t:"That Cherry Valance is secretly sympathetic to the Greasers' cause",correct:false}],
 explain:"Cherry's statement to Ponyboy reveals that Socs also face personal struggles — it's a key moment of empathy that challenges class-based assumptions."},

{section:'outsiders-themes', q:"In <em>The Outsiders</em>, the Greasers perform 'toughness' even when they don't feel it. What theme does this best illustrate?",
 opts:[{t:"The importance of physical strength in survival",correct:false},{t:"Identity as a social performance shaped by expectations",correct:true},{t:"The corruption of youth by gang culture",correct:false},{t:"The impossibility of escaping one's social class",correct:false}],
 explain:"The Greasers adopt a tough identity as a survival strategy — illustrating that identity is performed for an audience, not simply lived from within."},

/* ══ M. BUTTERFLY — BACKGROUND ══ */
{section:'mb-bg', q:"Which literary work directly inspired <em>M. Butterfly</em>?",
 opts:[{t:"A Chinese folk tale about forbidden love",correct:false},{t:"The opera <em>Madame Butterfly</em>",correct:true},{t:"A Cold War spy novel",correct:false},{t:"A Japanese haiku collection about identity",correct:false}],
 explain:"David Henry Hwang's play is directly inspired by Puccini's opera Madame Butterfly, which it subverts and critiques."},

{section:'mb-bg', q:"Which literary devices does <em>M. Butterfly</em> use to tell its story? (Choose the most complete answer)",

const SECTION_META = {
  'outsiders-bg':     { label:'The Outsiders — Setting & Background',  color:'#d2a8ff' },
  'outsiders-chars':  { label:'The Outsiders — Characters',            color:'#a371f7' },
  'outsiders-plot':   { label:'The Outsiders — Plot',                  color:'#79c0ff' },
  'outsiders-themes': { label:'The Outsiders — Themes & Symbols',      color:'#56d364' },
  'mb-bg':            { label:'M. Butterfly — Background & Structure',  color:'#ffa657' },
  'mb-chars':         { label:'M. Butterfly — Characters',              color:'#ff7b72' },
  'mb-themes':        { label:'M. Butterfly — Themes, Symbols & Irony', color:'#f778ba' },
  'quotes':           { label:'Quotes',                                 color:'#e3b341' },
  'comparative':      { label:'Both Texts — Comparative Themes',        color:'#d2a8ff' },
};
const SECTION_ORDER = ['outsiders-bg','outsiders-chars','outsiders-plot','outsiders-themes','mb-bg','mb-chars','mb-themes','quotes','comparative'];

let answers = {};
let currentSection = 'all';

function buildQuiz() {
  const area = document.getElementById('quiz-area');
  area.innerHTML = '';

  SECTION_ORDER.forEach(secKey => {
    if (currentSection !== 'all' && currentSection !== secKey) return;
    const meta = SECTION_META[secKey];
    const qs = ALL_QUESTIONS.map((q,i) => ({...q,idx:i})).filter(q => q.section === secKey);

    const sh = document.createElement('div');
    sh.className = 'section-header';
    sh.innerHTML = `<span class="section-dot" style="background:${meta.color}"></span>${meta.label}`;
    area.appendChild(sh);

    qs.forEach(q => {
      const card = document.createElement('div');
      card.className = 'q-card' + (answers[q.idx] ? ' answered' : '');
      card.id = `card-${q.idx}`;

      const shuffled = shuffleOpts(q.opts);
      const letters = ['A','B','C','D'];

      const optsHTML = shuffled.map((opt, i) => {
        let cls = 'opt';
        const st = answers[q.idx];
        if (st) {
          if (i === st.chosen && st.correct)       cls += ' correct-pick';
          else if (i === st.chosen && !st.correct) cls += ' wrong-pick';
          else if (opt.correct && !st.correct)     cls += ' reveal-correct';
        }
        return `<button class="${cls}" onclick="pick(${q.idx},${i},this)" ${answers[q.idx]?'disabled':''}>
          <span class="opt-letter">${letters[i]}</span>${opt.t}
        </button>`;
      }).join('');

      card.innerHTML = `
        <div class="q-header">
          <span class="q-num">Q${q.idx+1}</span>
          <div>
            <div class="q-section-label">${meta.label}</div>
            <div class="q-text">${q.q}</div>
          </div>
        </div>
        <div class="options" id="opts-${q.idx}">${optsHTML}</div>
        <div class="explanation${answers[q.idx]?' show':''}" id="exp-${q.idx}"><strong>Explanation:</strong> ${q.explain}</div>
      `;
      card.dataset.shuffled = JSON.stringify(shuffled.map(o => o.correct));
      area.appendChild(card);
    });
  });

  updateProgress();
}

function shuffleOpts(opts) {
  const arr = [...opts];
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

function pick(qIdx, chosenIdx) {
  if (answers[qIdx]) return;
  const card = document.getElementById(`card-${qIdx}`);
  const shuffledCorrects = JSON.parse(card.dataset.shuffled);
  const isCorrect = shuffledCorrects[chosenIdx];
  answers[qIdx] = { chosen: chosenIdx, correct: isCorrect };

  card.querySelectorAll('.opt').forEach((b,i) => {
    b.disabled = true;
    if (i === chosenIdx && isCorrect)       b.classList.add('correct-pick');
    else if (i === chosenIdx && !isCorrect) b.classList.add('wrong-pick');
    else if (shuffledCorrects[i] && !isCorrect) b.classList.add('reveal-correct');
  });

  document.getElementById(`exp-${qIdx}`).classList.add('show');
  card.classList.add('answered');
  updateProgress();
}

function updateProgress() {
  const total    = ALL_QUESTIONS.length;
  const answered = Object.keys(answers).length;
  const correct  = Object.values(answers).filter(a => a.correct).length;
  const wrong    = answered - correct;

  document.getElementById('prog-label').textContent = `${answered} of ${total} answered`;
  const pct = Math.round((answered/total)*100);
  document.getElementById('prog-pct').textContent  = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('sc-correct').textContent = correct;
  document.getElementById('sc-wrong').textContent   = wrong;
  document.getElementById('sc-pct').textContent     = answered > 0 ? Math.round((correct/answered)*100)+'%' : '—';
}

function filterSection(sec, btn) {
  currentSection = sec;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildQuiz();
}

function showResults() {
  const total    = ALL_QUESTIONS.length;
  const answered = Object.keys(answers).length;
  const correct  = Object.values(answers).filter(a => a.correct).length;
  const wrong    = Object.values(answers).filter(a => !a.correct).length;
  const skipped  = total - answered;
  const pct      = Math.round((correct/total)*100);

  let grade, color;
  if      (pct>=90){grade='A';color='var(--accent)';}
  else if (pct>=80){grade='B';color='var(--accent4)';}
  else if (pct>=70){grade='C';color='#e3b341';}
  else if (pct>=60){grade='D';color='var(--accent3)';}
  else             {grade='F';color='var(--accent3)';}

  document.getElementById('r-grade').textContent   = pct+'%';
  document.getElementById('r-grade').style.color   = color;
  document.getElementById('r-label').textContent   = `Grade: ${grade} · ${correct} correct out of ${total} questions`;
  document.getElementById('r-correct').textContent = correct;
  document.getElementById('r-wrong').textContent   = wrong;
  document.getElementById('r-skip').textContent    = skipped;

  const missed = ALL_QUESTIONS.map((q,i)=>({...q,idx:i})).filter(q=>answers[q.idx]&&!answers[q.idx].correct);
  const missedEl = document.getElementById('missed-list');

  if (missed.length) {
    missedEl.innerHTML = `<h3>Review These (${missed.length})</h3>` +
      missed.map(q=>`<div class="missed-item">Q${q.idx+1}: <span>${q.q}</span></div>`).join('');
  } else if (answered===total) {
    missedEl.innerHTML = `<div style="color:var(--accent);font-size:15px;text-align:center;margin-top:8px">🎉 Perfect score! All questions answered correctly!</div>`;
  } else {
    missedEl.innerHTML = '';
  }

  document.getElementById('results-screen').style.display = 'block';
  document.getElementById('results-screen').scrollIntoView({behavior:'smooth'});
}

function resetQuiz() {
  answers = {};
  document.getElementById('results-screen').style.display = 'none';
  buildQuiz();
  window.scrollTo({top:0,behavior:'smooth'});
}

buildQuiz();
</script>

      {
        text: "In both texts, identity is performed to meet social expectations. Which pair best illustrates this?",
        options: ["Ponyboy acts tough; Gallimard acts submissive", "Dally acts vulnerable; Song acts dominant", "Greasers act tough to survive; Song acts submissive to manipulate", "Cherry acts poor; Helga acts powerful"],
        answer: 2,
        feedback: "Greasers perform toughness as a survival strategy; Song performs submissiveness as a manipulation strategy. Both show identity as a social performance."
      },
      {
        text: "Both Gallimard and the Greasers are 'trapped' by their identities. What is the key difference in how this trap works?",
        options: ["Gallimard chose his trap freely; the Greasers were forced into theirs by society", "The Greasers enjoy their identity; Gallimard resents his", "Gallimard's trap is legal; the Greasers' trap is social", "There is no meaningful difference — both are equally trapped by external forces"],
        answer: 0,
        feedback: "Gallimard actively chooses to believe his fantasy despite evidence to the contrary; the Greasers are assigned their identity by society and have little power to escape it."
      },
      {
        text: "How does empathy function as a theme in <em>The Outsiders</em>?",
        options: ["It is presented as naive and ultimately ineffective", "It only works between people of the same social class", "It is shown to break cycles of hatred when characters look past labels", "It leads directly to more violence and misunderstanding"],
        answer: 2,
        feedback: "Cherry and Ponyboy's connection over sunsets, and Cherry's 'Things are rough all over,' show that empathy — seeing past class labels — can bridge division."
      },
      {
        text: "Which statement best describes the role of illusion vs. reality across both texts?",
        options: ["Both texts show that illusions are harmless and help characters cope", "In The Outsiders, illusion is dangerous; in M. Butterfly, reality is dangerous", "Both texts show that clinging to illusions rather than accepting reality leads to tragedy", "Reality is always visible to characters in both texts — they simply choose to ignore it"],
        answer: 2,
        feedback: "Ponyboy must shed his illusions about Socs and Greasers; Gallimard's refusal to let go of his fantasy destroys him. Both texts treat unchallenged illusion as tragic."
      },
      {
        text: "Both S. E. Hinton and David Henry Hwang critique society through their works. Which pairing best captures what each author is criticizing?",
        options: ["Hinton critiques technology; Hwang critiques religion", "Hinton critiques class inequality and stereotypes; Hwang critiques racial and gender stereotypes", "Hinton critiques the justice system; Hwang critiques capitalism", "Hinton critiques education; Hwang critiques diplomacy"],
        answer: 1,
        feedback: "Hinton uses Greasers vs. Socs to critique class-based stereotypes; Hwang uses Gallimard's fantasy to critique Orientalism and gender assumptions."
      }
    ]
  }
];

// ─────────────────────────────────────────────
// Flatten for quiz logic
// ─────────────────────────────────────────────
const questions = [];
const questionSection = []; // parallel array: which section label does each Q belong to?
sections.forEach(sec => {
  sec.questions.forEach(q => {
    questions.push({ ...q, tag: sec.label });
    questionSection.push(sec.label);
  });
});

const TOTAL = questions.length;
let answered = new Array(TOTAL).fill(false);
let submitted = false;

// ─────────────────────────────────────────────
// Build DOM
// ─────────────────────────────────────────────
function buildQuiz() {
  answered = new Array(TOTAL).fill(false);
  submitted = false;

  document.getElementById('header-sub').textContent =
    `${TOTAL} questions · Select the best answer for each`;
  document.getElementById('score-denom').textContent = `out of ${TOTAL}`;
  document.getElementById('score-panel').style.display = 'none';
  document.getElementById('submit-wrap').style.display = 'block';
  document.getElementById('submit-btn').disabled = true;
  updateProgress();

  const root = document.getElementById('quiz-root');
  root.innerHTML = '';

  let currentSection = null;
  let containerEl = null;

  questions.forEach((q, qi) => {
    // Section divider
    if (q.tag !== currentSection) {
      currentSection = q.tag;
      const div = document.createElement('div');
      div.className = 'section-divider';
      div.innerHTML = `<span>${currentSection}</span>`;
      root.appendChild(div);

      containerEl = document.createElement('div');
      containerEl.className = 'quiz-container';
      root.appendChild(containerEl);
    }

    const letters = ['A', 'B', 'C', 'D'];
    const optsHTML = q.options.map((opt, oi) => `
      <button class="opt-btn" onclick="selectAnswer(${qi},${oi})">
        <span class="opt-letter">${letters[oi]}.</span>
        <span>${opt}</span>
      </button>
    `).join('');

    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = `q-${qi}`;
    card.innerHTML = `
      <div class="q-meta">Q${qi + 1} of ${TOTAL}</div>
      <div class="q-text">${q.text}</div>
      <div class="options" id="opts-${qi}">${optsHTML}</div>
      <div class="feedback" id="fb-${qi}"></div>
    `;
    containerEl.appendChild(card);
  });
}

function selectAnswer(qi, oi) {
  if (submitted) return;
  const opts = document.querySelectorAll(`#opts-${qi} .opt-btn`);
  opts.forEach(b => b.classList.remove('selected'));
  opts[oi].classList.add('selected');
  answered[qi] = oi;
  updateProgress();
  checkSubmitReady();
}

function updateProgress() {
  const count = answered.filter(v => v !== false).length;
  const pct = Math.round((count / TOTAL) * 100);
  document.getElementById('prog-text').textContent = `${count} of ${TOTAL} answered`;
  document.getElementById('prog-pct').textContent = `${pct}%`;
  document.getElementById('prog-bar').style.width = pct + '%';
}

function checkSubmitReady() {
  document.getElementById('submit-btn').disabled = !answered.every(v => v !== false);
}

function submitQuiz() {
  if (submitted) return;
  submitted = true;
  document.getElementById('submit-btn').disabled = true;

  let score = 0;
  questions.forEach((q, qi) => {
    const chosen = answered[qi];
    const opts = document.querySelectorAll(`#opts-${qi} .opt-btn`);
    const fb = document.getElementById(`fb-${qi}`);
    opts.forEach(b => { b.disabled = true; b.classList.remove('selected'); });

    if (chosen === q.answer) {
      score++;
      opts[chosen].classList.add('correct');
      fb.textContent = '✓ Correct. ' + q.feedback;
      fb.className = 'feedback show correct-fb';
    } else {
      opts[chosen].classList.add('wrong');
      opts[q.answer].classList.add('reveal');
      fb.textContent = '✗ ' + q.feedback;
      fb.className = 'feedback show wrong-fb';
    }
  });

  showScore(score);
}

function showScore(score) {
  document.getElementById('submit-wrap').style.display = 'none';
  const panel = document.getElementById('score-panel');
  panel.style.display = 'block';
  document.getElementById('score-num').textContent = score;
  document.getElementById('score-denom').textContent = `out of ${TOTAL}`;

  const pct = (score / TOTAL) * 100;
  let grade, msg;
  if      (pct >= 90) { grade = 'A'; msg = 'Excellent — you have a strong command of both texts going into the exam.'; }
  else if (pct >= 80) { grade = 'B'; msg = 'Good work. Review the sections you missed, especially themes and irony.'; }
  else if (pct >= 70) { grade = 'C'; msg = 'Passing, but revisit character analysis and the comparative themes section.'; }
  else if (pct >= 60) { grade = 'D'; msg = 'Keep studying — re-read the symbols, themes, and quote sections of your study guide.'; }
  else                { grade = 'F'; msg = 'More review needed. Go back through the full study guide, especially major themes, characters, and quotes.'; }

  document.getElementById('score-grade').textContent = grade;
  document.getElementById('score-msg').textContent = msg;
  panel.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function resetQuiz() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
  setTimeout(buildQuiz, 300);
}

document.getElementById('submit-btn').addEventListener('click', submitQuiz);
buildQuiz();
</script>

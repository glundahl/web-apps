<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Algebra Final Review</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2330;
    --border: #30363d;
    --accent: #f7c948;
    --accent2: #58a6ff;
    --accent3: #f78166;
    --accent4: #d2a8ff;
    --text: #e6edf3;
    --text-muted: #7d8590;
    --text-dim: #484f58;
    --correct: #2d2a10;
    --correct-border: #f7c948;
    --wrong: #4d1a1a;
    --wrong-border: #f78166;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
    border-bottom: 1px solid var(--border);
    padding: 40px 20px 30px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 70% 80% at 50% -20%, rgba(247,201,72,.11) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }
  .header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(26px, 5vw, 44px);
    font-weight: 800;
    line-height: 1.1;
    color: var(--text);
  }
  .header h1 span { color: var(--accent); }
  .header-sub {
    margin-top: 10px;
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 300;
  }
  .pill-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 18px;
  }
  .pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--text-muted);
  }

  /* ── PROGRESS BAR ── */
  .progress-wrap {
    max-width: 760px;
    margin: 24px auto 0;
    padding: 0 20px;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .progress-track {
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width .4s ease;
    width: 0%;
  }

  /* ── SCORE CARD ── */
  .score-card {
    max-width: 760px;
    margin: 16px auto 0;
    padding: 0 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .score-item {
    flex: 1;
    min-width: 100px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    text-align: center;
  }
  .score-item .num {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 700;
  }
  .score-item .lbl { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .score-item.correct .num { color: var(--accent); }
  .score-item.wrong .num { color: var(--accent3); }
  .score-item.pct .num { color: var(--accent2); }

  /* ── SECTION TABS ── */
  .tabs {
    max-width: 760px;
    margin: 24px auto 0;
    padding: 0 20px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .tab-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all .2s;
  }
  .tab-btn:hover { border-color: var(--accent2); color: var(--text); }
  .tab-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0d1117;
    font-weight: 600;
  }

  /* ── QUIZ AREA ── */
  .quiz-area {
    max-width: 760px;
    margin: 20px auto 0;
    padding: 0 20px;
  }

  /* ── QUESTION CARD ── */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 14px;
    transition: border-color .3s;
    animation: fadeSlide .35s ease both;
  }
  @keyframes fadeSlide {
    from { opacity:0; transform: translateY(12px); }
    to   { opacity:1; transform: translateY(0); }
  }
  .q-card.answered { border-color: var(--border); }

  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 16px;
  }
  .q-num {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 8px;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .q-text {
    font-size: 15px;
    font-weight: 500;
    line-height: 1.5;
    color: var(--text);
  }
  .q-chapter {
    font-size: 10px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  /* ── MATH DISPLAY ── */
  .math-block {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    margin: 10px 0 4px;
    font-family: 'Courier New', monospace;
    font-size: 15px;
    color: var(--accent);
    letter-spacing: .02em;
    text-align: center;
  }
  .math-inline {
    font-family: 'Courier New', monospace;
    font-size: 14px;
    color: var(--accent);
    background: rgba(247,201,72,.08);
    border-radius: 4px;
    padding: 1px 5px;
  }

  /* ── GRAPH SVG ── */
  .graph-wrap {
    margin: 12px 0 8px;
    display: flex;
    justify-content: center;
  }
  .graph-wrap svg {
    border-radius: 8px;
    background: #111827;
    border: 1px solid var(--border);
  }

  /* ── ANSWER OPTIONS ── */
  .options { display: flex; flex-direction: column; gap: 8px; }

  .opt {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    cursor: pointer;
    transition: all .18s;
    font-size: 14px;
    line-height: 1.45;
    color: var(--text);
    text-align: left;
    width: 100%;
    font-family: 'DM Sans', sans-serif;
  }
  .opt:hover:not(:disabled) {
    border-color: var(--accent2);
    background: #1c2d3f;
    transform: translateX(2px);
  }
  .opt:disabled { cursor: default; transform: none; }

  .opt-letter {
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    transition: all .18s;
    margin-top: 1px;
  }
  .opt:hover:not(:disabled) .opt-letter {
    background: var(--accent2);
    color: #fff;
  }

  .opt.correct-pick {
    background: var(--correct);
    border-color: var(--correct-border);
    color: #fef3c7;
  }
  .opt.correct-pick .opt-letter { background: var(--accent); color: #0d1117; }

  .opt.wrong-pick {
    background: var(--wrong);
    border-color: var(--wrong-border);
    color: #ffa198;
  }
  .opt.wrong-pick .opt-letter { background: var(--accent3); color: #fff; }

  .opt.reveal-correct {
    background: rgba(247,201,72,.08);
    border-color: rgba(247,201,72,.4);
    color: #fef3c7;
  }
  .opt.reveal-correct .opt-letter { background: rgba(247,201,72,.3); color: var(--accent); }

  /* math in answer options */
  .opt .math-inline {
    font-size: 13px;
  }

  /* ── EXPLANATION ── */
  .explanation {
    display: none;
    margin-top: 12px;
    padding: 12px 14px;
    background: rgba(88,166,255,.07);
    border: 1px solid rgba(88,166,255,.2);
    border-radius: var(--radius);
    font-size: 13px;
    color: #a5c8ff;
    line-height: 1.55;
  }
  .explanation.show { display: block; }
  .explanation strong { color: var(--accent2); }
  .explanation .math-inline { font-size: 12px; }

  /* ── SECTION HEADER ── */
  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 28px 0 14px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--text-muted);
  }
  .section-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .section-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── CONTROLS ── */
  .controls {
    max-width: 760px;
    margin: 28px auto 0;
    padding: 0 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .btn {
    padding: 10px 22px;
    border-radius: var(--radius);
    border: none;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .04em;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-primary {
    background: var(--accent);
    color: #0d1117;
  }
  .btn-primary:hover { background: #fad156; transform: translateY(-1px); }
  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--accent2); transform: translateY(-1px); }

  /* ── FINAL RESULTS ── */
  #results-screen {
    display: none;
    max-width: 760px;
    margin: 30px auto;
    padding: 0 20px;
    text-align: center;
  }
  .results-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 30px;
  }
  .results-grade {
    font-family: 'Syne', sans-serif;
    font-size: 72px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 8px;
  }
  .results-label {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 28px;
  }
  .results-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }
  .results-stat {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .results-stat .n {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 700;
  }
  .results-stat .l { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

  .missed-list { text-align: left; margin-top: 20px; }
  .missed-list h3 {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--accent3);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .missed-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 6px;
    line-height: 1.4;
  }
  .missed-item span { color: var(--text); }

  @media(max-width:520px){
    .score-item { min-width: 80px; padding: 10px; }
    .score-item .num { font-size: 20px; }
    .q-card { padding: 18px; }
    .opt { font-size: 13px; padding: 10px 12px; }
    .results-grade { font-size: 56px; }
    .results-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-label">Final Review</div>
  <h1>Algebra <span>Quiz</span></h1>
  <div class="header-sub">Lines · Systems · Scatter Plots · Functions</div>
  <div class="pill-row">
    <span class="pill" id="q-count-pill">65 Questions</span>
    <span class="pill">Multiple Choice</span>
    <span class="pill">Instant Feedback</span>
  </div>
</div>

<!-- PROGRESS -->
<div class="progress-wrap">
  <div class="progress-meta">
    <span id="prog-label">0 of 65 answered</span>
    <span id="prog-pct">0%</span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div>
</div>

<!-- SCORE CARD -->
<div class="score-card">
  <div class="score-item correct"><div class="num" id="sc-correct">0</div><div class="lbl">Correct</div></div>
  <div class="score-item wrong"><div class="num" id="sc-wrong">0</div><div class="lbl">Incorrect</div></div>
  <div class="score-item pct"><div class="num" id="sc-pct">—</div><div class="lbl">Score</div></div>
</div>

<!-- SECTION TABS -->
<div class="tabs">
  <button class="tab-btn active" onclick="filterSection('all',this)">All Questions</button>
  <button class="tab-btn" onclick="filterSection('lines',this)">Lines &amp; Slope</button>
  <button class="tab-btn" onclick="filterSection('parallel',this)">Parallel &amp; Perp.</button>
  <button class="tab-btn" onclick="filterSection('systems',this)">Systems</button>
  <button class="tab-btn" onclick="filterSection('scatter',this)">Scatter &amp; Functions</button>
</div>

<!-- QUIZ AREA -->
<div class="quiz-area" id="quiz-area"></div>

<!-- CONTROLS -->
<div class="controls">
  <button class="btn btn-primary" onclick="showResults()">See Final Score</button>
  <button class="btn btn-secondary" onclick="resetQuiz()">Reset Quiz</button>
</div>

<!-- RESULTS SCREEN -->
<div id="results-screen">
  <div class="results-box">
    <div class="results-grade" id="r-grade">—</div>
    <div class="results-label" id="r-label">calculating…</div>
    <div class="results-grid">
      <div class="results-stat"><div class="n" id="r-correct" style="color:var(--accent)">0</div><div class="l">Correct</div></div>
      <div class="results-stat"><div class="n" id="r-wrong" style="color:var(--accent3)">0</div><div class="l">Incorrect</div></div>
      <div class="results-stat"><div class="n" id="r-skip" style="color:var(--text-muted)">0</div><div class="l">Skipped</div></div>
    </div>
    <div class="missed-list" id="missed-list"></div>
    <button class="btn btn-primary" style="margin-top:24px;width:100%" onclick="resetQuiz()">Retake Quiz</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────
// HELPER: tiny SVG coordinate grid for graph questions
// ─────────────────────────────────────────────────────────
function makeGrid(w, h, xMin, xMax, yMin, yMax) {
  const px = (x) => ((x - xMin) / (xMax - xMin)) * w;
  const py = (y) => h - ((y - yMin) / (yMax - yMin)) * h;
  let s = '';

  // grid lines
  s += '<g stroke="#2a3040" stroke-width="1">';
  for (let x = xMin; x <= xMax; x++) {
    s += `<line x1="${px(x)}" y1="0" x2="${px(x)}" y2="${h}"/>`;
  }
  for (let y = yMin; y <= yMax; y++) {
    s += `<line x1="0" y1="${py(y)}" x2="${w}" y2="${py(y)}"/>`;
  }
  s += '</g>';

  // axes
  s += `<line x1="${px(0)}" y1="0" x2="${px(0)}" y2="${h}" stroke="#4a5568" stroke-width="1.5"/>`;
  s += `<line x1="0" y1="${py(0)}" x2="${w}" y2="${py(0)}" stroke="#4a5568" stroke-width="1.5"/>`;

  // tick labels
  s += '<g fill="#6b7280" font-size="8" font-family="monospace">';
  for (let x = xMin; x <= xMax; x++) {
    if (x !== 0) s += `<text x="${px(x)}" y="${py(0) + 10}" text-anchor="middle">${x}</text>`;
  }
  for (let y = yMin; y <= yMax; y++) {
    if (y !== 0) s += `<text x="${px(0) - 8}" y="${py(y) + 3}" text-anchor="end">${y}</text>`;
  }
  s += '</g>';

  return { svg: s, px, py };
}

function lineSegment(px, py, m, b, xMin, xMax, color = '#f7c948', width = 2) {
  const x1 = xMin, y1 = m * xMin + b;
  const x2 = xMax, y2 = m * xMax + b;
  return `<line x1="${px(x1)}" y1="${py(y1)}" x2="${px(x2)}" y2="${py(y2)}" stroke="${color}" stroke-width="${width}" stroke-linecap="round"/>`;
}

function verticalLine(px, py, x, yMin, yMax, color = '#f7c948', width = 2) {
  return `<line x1="${px(x)}" y1="${py(yMin + 0.1)}" x2="${px(x)}" y2="${py(yMax - 0.1)}" stroke="${color}" stroke-width="${width}" stroke-linecap="round"/>`;
}

function dot(px, py, x, y, color = '#f7c948', filled = true) {
  return `<circle cx="${px(x)}" cy="${py(y)}" r="4" fill="${filled ? color : 'none'}" stroke="${color}" stroke-width="1.8"/>`;
}

function buildSVG(w, h, xMin, xMax, yMin, yMax, drawFn) {
  const { svg, px, py } = makeGrid(w, h, xMin, xMax, yMin, yMax);
  const inner = drawFn(px, py);
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">${svg}${inner}</svg>`;
}

// ─────────────────────────────────────────────────────────
// QUESTION BANK
// ─────────────────────────────────────────────────────────
const ALL_QUESTIONS = [

/* ══════════════════════════════════════════════
   SECTION: LINES & SLOPE
══════════════════════════════════════════════ */

{section:'lines', q:"What is the formula used to calculate slope from two points?",
 opts:[
  {t:"m = (y₂ − y₁) / (x₂ − x₁)", correct:true},
  {t:"m = (x₂ − x₁) / (y₂ − y₁)", correct:false},
  {t:"m = (y₂ + y₁) / (x₂ + x₁)", correct:false},
  {t:"m = (y₁ − y₂) / (x₁ + x₂)", correct:false}
 ],
 explain:"<strong>Slope formula:</strong> m = (y₂ − y₁) / (x₂ − x₁). Rise over run — change in y divided by change in x."},

{section:'lines', q:"Which equation represents slope-intercept form?",
 opts:[
  {t:"Ax + By = C", correct:false},
  {t:"y − y₁ = m(x − x₁)", correct:false},
  {t:"y = mx + b", correct:true},
  {t:"y = b + xm", correct:false}
 ],
 explain:"<strong>Slope-intercept form</strong> is y = mx + b, where m is the slope and b is the y-intercept."},

{section:'lines', q:"Which equation represents point-slope form?",
 opts:[
  {t:"y = mx + b", correct:false},
  {t:"y − y₁ = m(x − x₁)", correct:true},
  {t:"Ax + By = C", correct:false},
  {t:"m = (y₂ − y₁)/(x₂ − x₁)", correct:false}
 ],
 explain:"<strong>Point-slope form</strong> is y − y₁ = m(x − x₁). You use it when you know a point on the line and the slope."},

{section:'lines', q:"Which equation represents standard form for a linear equation?",
 opts:[
  {t:"y = mx + b", correct:false},
  {t:"y − y₁ = m(x − x₁)", correct:false},
  {t:"Ax + By = C", correct:true},
  {t:"y/x = m + b", correct:false}
 ],
 explain:"<strong>Standard form</strong> is Ax + By = C, where A, B, and C are integers and A is typically positive."},

{section:'lines', q:`What is the slope of the line <span class="math-inline">y = 3x − 7</span>?`,
 opts:[
  {t:"−7", correct:false},
  {t:"3", correct:true},
  {t:"7", correct:false},
  {t:"−3", correct:false}
 ],
 explain:"In y = mx + b, m is the slope. Here m = <strong>3</strong> and the y-intercept is −7."},

{section:'lines', q:`What is the y-intercept of the line <span class="math-inline">y = −4x + 9</span>?`,
 opts:[
  {t:"−4", correct:false},
  {t:"4", correct:false},
  {t:"9", correct:true},
  {t:"−9", correct:false}
 ],
 explain:"In y = mx + b, b is the y-intercept. Here b = <strong>9</strong> and the slope is −4."},

{section:'lines', q:`What is the slope of the line <span class="math-inline">y = (2/3)x − 5</span>?`,
 opts:[
  {t:"−5", correct:false},
  {t:"3/2", correct:false},
  {t:"2/3", correct:true},
  {t:"−2/3", correct:false}
 ],
 explain:"The coefficient of x is the slope. m = <strong>2/3</strong>."},

{section:'lines', q:`Identify the slope and y-intercept of <span class="math-inline">y = −(1/4)x + 10</span>.`,
 opts:[
  {t:"slope = 10, y-intercept = −1/4", correct:false},

// update pill count
document.getElementById('q-count-pill').textContent = ALL_QUESTIONS.length + ' Questions';
document.getElementById('prog-label').textContent = `0 of ${ALL_QUESTIONS.length} answered`;

// ──────────────────────────────────────────────
// STATE
// ──────────────────────────────────────────────
let answers = {};
let currentSection = 'all';

// ──────────────────────────────────────────────
// BUILD QUIZ
// ──────────────────────────────────────────────
function buildQuiz() {
  const area = document.getElementById('quiz-area');
  area.innerHTML = '';

  const sections = [
    {key:'lines',    label:'Lines & Slope',              color:'#f7c948'},
    {key:'parallel', label:'Parallel & Perpendicular',   color:'#58a6ff'},
    {key:'systems',  label:'Systems of Equations',       color:'#3fb950'},
    {key:'scatter',  label:'Scatter Plots, Functions & Variation', color:'#d2a8ff'},
  ];

  sections.forEach(sec => {
    const qs = ALL_QUESTIONS.map((q,i)=>({...q,idx:i})).filter(q=>q.section===sec.key);
    if(currentSection !== 'all' && currentSection !== sec.key) return;

    const sh = document.createElement('div');
    sh.className='section-header';
    sh.innerHTML=`<span class="section-dot" style="background:${sec.color}"></span>${sec.label}`;
    area.appendChild(sh);

    qs.forEach(q => {
      const card = document.createElement('div');
      card.className = 'q-card';
      card.id = `card-${q.idx}`;
      if(answers[q.idx]) card.classList.add('answered');

      const shuffled = shuffleOpts(q.opts);

      let optsHTML = shuffled.map((opt, i) => {
        let cls = 'opt';
        const st = answers[q.idx];
        if(st) {
          if(i === st.chosen && st.correct) cls += ' correct-pick';
          else if(i === st.chosen && !st.correct) cls += ' wrong-pick';
          else if(opt.correct && !st.correct) cls += ' reveal-correct';
        }
        const letters = ['A','B','C','D'];
        return `<button class="${cls}" onclick="pick(${q.idx},${i},this)" ${answers[q.idx]?'disabled':''}>
          <span class="opt-letter">${letters[i]}</span>${opt.t}
        </button>`;
      }).join('');

      const expShow = answers[q.idx] ? 'show' : '';
      card.innerHTML = `
        <div class="q-header">
          <span class="q-num">Q${q.idx+1}</span>
          <div><div class="q-chapter">${sec.label}</div><div class="q-text">${q.q}</div></div>
        </div>
        <div class="options" id="opts-${q.idx}">${optsHTML}</div>
        <div class="explanation ${expShow}" id="exp-${q.idx}"><strong>Explanation:</strong> ${q.explain}</div>
      `;

      card.dataset.shuffled = JSON.stringify(shuffled.map(o=>o.correct));
      area.appendChild(card);
    });
  });
  updateProgress();
}

function shuffleOpts(opts) {
  const arr = [...opts];
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

// ──────────────────────────────────────────────
// PICK ANSWER
// ──────────────────────────────────────────────
function pick(qIdx, chosenIdx, btn) {
  if(answers[qIdx]) return;

  const card = document.getElementById(`card-${qIdx}`);
  const shuffledCorrects = JSON.parse(card.dataset.shuffled);
  const isCorrect = shuffledCorrects[chosenIdx];

  answers[qIdx] = {chosen: chosenIdx, correct: isCorrect};

  const optBtns = card.querySelectorAll('.opt');
  optBtns.forEach((b,i)=>{
    b.disabled = true;
    if(i===chosenIdx && isCorrect) b.classList.add('correct-pick');
    else if(i===chosenIdx && !isCorrect) b.classList.add('wrong-pick');
    else if(shuffledCorrects[i] && !isCorrect) b.classList.add('reveal-correct');
  });

  document.getElementById(`exp-${qIdx}`).classList.add('show');
  card.classList.add('answered');
  updateProgress();
}

// ──────────────────────────────────────────────
// PROGRESS / SCORE
// ──────────────────────────────────────────────
function updateProgress() {
  const total = ALL_QUESTIONS.length;
  const answered = Object.keys(answers).length;
  const correct = Object.values(answers).filter(a=>a.correct).length;
  const wrong = answered - correct;

  document.getElementById('prog-label').textContent = `${answered} of ${total} answered`;
  const pct = Math.round((answered/total)*100);
  document.getElementById('prog-pct').textContent = pct+'%';
  document.getElementById('prog-fill').style.width = pct+'%';

  document.getElementById('sc-correct').textContent = correct;
  document.getElementById('sc-wrong').textContent = wrong;
  if(answered>0){
    const score = Math.round((correct/answered)*100);
    document.getElementById('sc-pct').textContent = score+'%';
  } else {
    document.getElementById('sc-pct').textContent = '—';
  }
}

// ──────────────────────────────────────────────
// SECTION FILTER
// ──────────────────────────────────────────────
function filterSection(sec, btn) {
  currentSection = sec;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  buildQuiz();
}

// ──────────────────────────────────────────────
// SHOW RESULTS
// ──────────────────────────────────────────────
function showResults() {
  const total = ALL_QUESTIONS.length;
  const answered = Object.keys(answers).length;
  const correct = Object.values(answers).filter(a=>a.correct).length;
  const wrong = Object.values(answers).filter(a=>!a.correct).length;
  const skipped = total - answered;
  const pct = Math.round((correct/total)*100);

  let grade, color;
  if(pct>=90){grade='A';color='var(--accent)';}
  else if(pct>=80){grade='B';color='var(--accent2)';}
  else if(pct>=70){grade='C';color='#e3b341';}
  else if(pct>=60){grade='D';color='#f78166';}
  else{grade='F';color='#f78166';}

  document.getElementById('r-grade').textContent = pct+'%';
  document.getElementById('r-grade').style.color = color;
  document.getElementById('r-label').textContent = `Grade: ${grade} · ${correct} correct out of ${total} questions`;
  document.getElementById('r-correct').textContent = correct;
  document.getElementById('r-wrong').textContent = wrong;
  document.getElementById('r-skip').textContent = skipped;

  const missedEl = document.getElementById('missed-list');
  const missed = ALL_QUESTIONS.map((q,i)=>({...q,idx:i}))
    .filter(q=>answers[q.idx] && !answers[q.idx].correct);

  if(missed.length){
    missedEl.innerHTML = `<h3>Review These (${missed.length})</h3>` +
      missed.map(q=>{
        const plainQ = q.q.replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim().substring(0,80);
        return `<div class="missed-item">Q${q.idx+1}: <span>${plainQ}…</span></div>`;
      }).join('');
  } else if(answered===total){
    missedEl.innerHTML = `<div style="color:var(--accent);font-size:15px;text-align:center;margin-top:8px">🎉 Perfect score! Every question correct!</div>`;
  } else {
    missedEl.innerHTML = '';
  }

  document.getElementById('results-screen').style.display = 'block';
  document.getElementById('results-screen').scrollIntoView({behavior:'smooth'});
}

// ──────────────────────────────────────────────
// RESET
// ──────────────────────────────────────────────
function resetQuiz() {
  answers = {};
  document.getElementById('results-screen').style.display = 'none';
  buildQuiz();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── INIT ──
buildQuiz();
</script>

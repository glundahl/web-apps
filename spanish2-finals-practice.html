<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spanish 2 Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --surface: #1a1830;
    --card: #221f3a;
    --accent: #ff6b35;
    --accent2: #ffd166;
    --correct: #06d6a0;
    --wrong: #ef476f;
    --text: #fffffe;
    --muted: #a7a5c0;
    --border: #2e2b50;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
  }

  header p {
    color: var(--muted);
    margin-top: 0.5rem;
    font-size: 1rem;
  }

  .progress-bar-wrap {
    max-width: 680px;
    margin: 0 auto 2rem;
    background: var(--border);
    border-radius: 99px;
    height: 6px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .score-banner {
    text-align: center;
    margin-bottom: 1.2rem;
    font-size: 0.9rem;
    color: var(--muted);
    letter-spacing: 0.06em;
  }
  .score-banner span {
    color: var(--accent2);
    font-weight: 600;
  }

  .quiz-wrap {
    max-width: 680px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 1.6rem;
  }

  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem 1.6rem;
    transition: border-color 0.2s;
  }

  .q-card.answered-correct { border-color: var(--correct); }
  .q-card.answered-wrong   { border-color: var(--wrong); }

  .q-number {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.5rem;
  }

  .q-category {
    display: inline-block;
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: var(--surface);
    color: var(--muted);
    border-radius: 6px;
    padding: 2px 8px;
    margin-bottom: 0.75rem;
  }

  .q-text {
    font-size: 1.05rem;
    font-weight: 500;
    line-height: 1.5;
    margin-bottom: 1.1rem;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 0.55rem;
  }

  .option-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    padding: 0.7rem 1rem;
    text-align: left;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .option-btn:hover:not(:disabled) {
    background: #2a2750;
    border-color: var(--accent);
    transform: translateX(3px);
  }

  .option-btn .opt-letter {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    min-width: 24px;
    border-radius: 6px;
    background: var(--border);
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--muted);
  }

  .option-btn.correct {
    background: rgba(6,214,160,0.12);
    border-color: var(--correct);
    color: var(--correct);
  }
  .option-btn.correct .opt-letter { background: var(--correct); color: #fff; }

  .option-btn.wrong {
    background: rgba(239,71,111,0.12);
    border-color: var(--wrong);
    color: var(--wrong);
  }
  .option-btn.wrong .opt-letter { background: var(--wrong); color: #fff; }

  .option-btn.reveal-correct {
    background: rgba(6,214,160,0.07);
    border-color: var(--correct);
    color: var(--correct);
  }
  .option-btn.reveal-correct .opt-letter { background: var(--correct); color: #fff; }

  .option-btn:disabled { cursor: default; transform: none; }

  .feedback {
    margin-top: 0.8rem;
    font-size: 0.88rem;
    line-height: 1.5;
    color: var(--muted);
    padding: 0.6rem 0.9rem;
    border-radius: 8px;
    background: var(--surface);
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.fb-correct { color: var(--correct); }
  .feedback.fb-wrong { color: #ffd3dc; }

  .results-card {
    display: none;
    max-width: 680px;
    margin: 2rem auto 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem 2rem;
    text-align: center;
  }
  .results-card.show { display: block; }

  .results-card h2 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 900;
    margin-bottom: 0.5rem;
  }

  .big-score {
    font-size: 3.5rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin: 1rem 0 0.4rem;
  }

  .results-card p { color: var(--muted); font-size: 1rem; }

  .restart-btn {
    margin-top: 1.8rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #0f0e17;
    border: none;
    border-radius: 10px;
    padding: 0.8rem 2.4rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .restart-btn:hover { opacity: 0.88; transform: scale(1.03); }
</style>
</head>
<body>

<header>
  <h1>Spanish 2 Quiz</h1>
  <p>Preterite Tense · Direct Object Pronouns · Vocabulary</p>
</header>

<div class="progress-bar-wrap">
  <div class="progress-bar-fill" id="progressFill"></div>
</div>

<div class="score-banner" id="scoreBanner">Score: <span id="scoreDisplay">0</span> / <span id="totalDisplay">0</span></div>

<div class="quiz-wrap" id="quizWrap"></div>

<div class="results-card" id="resultsCard">
  <h2>Quiz Complete!</h2>
  <div class="big-score" id="bigScore"></div>
  <p id="resultMsg"></p>
  <button class="restart-btn" onclick="restartQuiz()">Try Again</button>
</div>

<script>
const questions = [
  // === DIRECT OBJECT PRONOUNS - TRANSLATION ===
  {
    category: "Direct Object Pronouns",
    question: "What does the direct object pronoun <em>la</em> mean?",
    options: ["him / it (masculine)", "her / it (feminine)", "them (masculine plural)", "them (feminine plural)"],
    answer: 1,
    feedback: "<em>La</em> replaces a feminine singular noun. Example: La película → la miro."
  },
  {
    category: "Direct Object Pronouns",
    question: "What does the direct object pronoun <em>los</em> mean?",
    options: ["him / it (masculine)", "her / it (feminine)", "them (masculine or mixed plural)", "them (feminine plural)"],
    answer: 2,
    feedback: "<em>Los</em> replaces masculine or mixed plural nouns. Example: los cuadernos → los tengo."
  },
  {
    category: "Direct Object Pronouns",
    question: "Which pronoun replaces <em>las fotos</em>?",
    options: ["lo", "la", "los", "las"],
    answer: 3,
    feedback: "<em>Las fotos</em> is feminine plural, so the pronoun is <em>las</em>."
  },
  {
    category: "Direct Object Pronouns",
    question: "Which pronoun replaces <em>el helado</em>?",
    options: ["lo", "la", "los", "las"],
    answer: 0,
    feedback: "<em>El helado</em> is masculine singular → <em>lo</em>."
  },
  {
    category: "Direct Object Pronouns",
    question: "Which pronoun replaces <em>la ropa</em>?",
    options: ["lo", "la", "los", "las"],
    answer: 1,
    feedback: "<em>La ropa</em> is feminine singular → <em>la</em>."
  },
  {
    category: "Direct Object Pronouns",
    question: "Which pronoun replaces <em>los guantes</em>?",
    options: ["lo", "la", "los", "las"],
    answer: 2,
    feedback: "<em>Los guantes</em> is masculine plural → <em>los</em>."
  },
  // === REWRITING WITH DIRECT OBJECT PRONOUNS ===
  {
    category: "Direct Object Pronouns",
    question: "Rewrite: <em>Ellos escucharon la música.</em>",
    options: ["Ellos lo escucharon.", "Ellos la escucharon.", "Ellos las escucharon.", "Ellos los escucharon."],
    answer: 1,
    feedback: "<em>La música</em> is feminine singular → <em>la</em>. The pronoun goes before the conjugated verb."
  },
  {
    category: "Direct Object Pronouns",
    question: "Rewrite: <em>Carlos preparó la comida.</em>",
    options: ["Carlos lo preparó.", "Carlos los preparó.", "Carlos la preparó.", "Carlos las preparó."],
    answer: 2,
    feedback: "<em>La comida</em> is feminine singular → <em>la</em>."
  },
  {
    category: "Direct Object Pronouns",
    question: "Rewrite: <em>¿Dónde compraste los guantes?</em>",
    options: ["¿Dónde la compraste?", "¿Dónde lo compraste?", "¿Dónde las compraste?", "¿Dónde los compraste?"],
    answer: 3,
    feedback: "<em>Los guantes</em> is masculine plural → <em>los</em>."
  },
  {
    category: "Direct Object Pronouns",
    question: "Rewrite: <em>Yo miré las fotos.</em>",
    options: ["Yo lo miré.", "Yo la miré.", "Yo las miré.", "Yo los miré."],
    answer: 2,
    feedback: "<em>Las fotos</em> is feminine plural → <em>las</em>."
  },
  {
    category: "Direct Object Pronouns",
    question: "Rewrite: <em>Llevo los refrescos.</em>",
    options: ["La llevo.", "Lo llevo.", "Las llevo.", "Los llevo."],
    answer: 3,
    feedback: "<em>Los refrescos</em> is masculine plural → <em>los</em>."
  },
  // === PRETERITE - REGULAR -AR ===
  {
    category: "Preterite: Regular -AR",
    question: "What is the <em>yo</em> form of <em>hablar</em> in the preterite?",
    options: ["hablé", "hablí", "hablé", "habló"],
    options: ["hablí", "hablé", "hablaste", "hablamos"],
    answer: 1,
    feedback: "Regular -AR verbs take <em>é</em> for the <em>yo</em> form: hablé."
  },
  {
    category: "Preterite: Regular -AR",
    question: "What is the <em>él/ella</em> form of <em>estudiar</em> in the preterite?",
    options: ["estudió", "estudió", "estudió", "estudié"],
    options: ["estudié", "estudiaste", "estudió", "estudiaron"],
    answer: 2,
    feedback: "Regular -AR, él/ella ending: <em>ó</em> → estudió."
  },
  {
    category: "Preterite: Regular -AR",
    question: "What is the <em>ustedes/ellos</em> form of <em>regresar</em> in the preterite?",
    options: ["regresé", "regresaron", "regresimos", "regresieron"],
    answer: 1,
    feedback: "Regular -AR, ellos/ustedes ending: <em>aron</em> → regresaron."
  },
  {
    category: "Preterite: Regular -AR",
    question: "What is the <em>tú</em> form of <em>caminar</em> in the preterite?",
    options: ["caminé", "caminaste", "caministe", "caminó"],
    answer: 1,
    feedback: "Regular -AR, tú ending: <em>aste</em> → caminaste."
  },
  {
    category: "Preterite: Regular -AR",
    question: "What is the <em>nosotros</em> form of <em>pasar</em> in the preterite?",
    options: ["pasé", "pasamos", "pasimos", "pasaron"],
    answer: 1,
    feedback: "Regular -AR, nosotros ending: <em>amos</em> → pasamos."
  },
  // === PRETERITE - REGULAR -ER/-IR ===
  {
    category: "Preterite: Regular -ER/-IR",
    question: "What is the <em>yo</em> form of <em>comer</em> in the preterite?",
    options: ["comé", "comí", "comiste", "comió"],
    answer: 1,
    feedback: "Regular -ER verbs take <em>í</em> for the yo form: comí."
  },
  {
    category: "Preterite: Regular -ER/-IR",
    question: "What is the <em>tú</em> form of <em>vivir</em> in the preterite?",
    options: ["vivaste", "viviste", "vivió", "viví"],
    answer: 1,
    feedback: "Regular -IR, tú ending: <em>iste</em> → viviste."
  },
  {
    category: "Preterite: Regular -ER/-IR",
    question: "What is the <em>ellos/ustedes</em> form of <em>beber</em> in the preterite?",
    options: ["bebaron", "bebieron", "bebimos", "bebiste"],
    answer: 1,
    feedback: "Regular -ER, ellos ending: <em>ieron</em> → bebieron."
  },
  {
    category: "Preterite: Regular -ER/-IR",
    question: "What is the <em>nosotros</em> form of <em>asistir</em> in the preterite?",
    options: ["asistamos", "asistimos", "asistieron", "asististe"],
    answer: 1,
    feedback: "Regular -IR, nosotros ending: <em>imos</em> → asistimos."
  },
  {
    category: "Preterite: Regular -ER/-IR",
    question: "What is the <em>él/ella</em> form of <em>compartir</em> in the preterite?",
    options: ["compartó", "compartió", "compartiste", "compartimos"],
    answer: 1,
    feedback: "Regular -IR, él/ella ending: <em>ió</em> → compartió."
  },
  // === ENDINGS DISTINCTION ===
  {
    category: "Preterite Endings",
    question: "Which ending is correct for <em>yo</em> with a regular <em>-ER</em> verb?",
    options: ["é", "í", "ó", "imos"],
    answer: 1,
    feedback: "-ER and -IR verbs use <em>í</em> for yo. Only -AR verbs use <em>é</em>."
  },
  {
    category: "Preterite Endings",
    question: "Which ending is correct for <em>ellos</em> with a regular <em>-AR</em> verb?",
    options: ["ieron", "aron", "imos", "amos"],
    answer: 1,
    feedback: "-AR verbs use <em>aron</em> for ellos/ustedes. -ER/-IR verbs use <em>ieron</em>."
  },
  {
    category: "Preterite Endings",
    question: "Which ending is correct for <em>tú</em> with a regular <em>-IR</em> verb?",
    options: ["aste", "iste", "ió", "iste"],
    options: ["aste", "iste", "ó", "ieron"],
    answer: 1,
    feedback: "-IR (and -ER) verbs use <em>iste</em> for tú. Only -AR uses <em>aste</em>."
  },
  // === IRREGULARS ===
  {
    category: "Irregular Verbs",
    question: "What is the <em>yo</em> form of <em>ir</em> in the preterite?",
    options: ["ié", "iré", "fui", "fue"],
    answer: 2,
    feedback: "<em>Ir</em> and <em>ser</em> share the same preterite forms. Yo → <em>fui</em>."
  },
  {
    category: "Irregular Verbs",
    question: "What is the <em>él/ella</em> form of <em>ser</em> in the preterite?",
    options: ["fui", "fuiste", "fue", "fueron"],
    answer: 2,
    feedback: "<em>Ser</em> and <em>ir</em> share forms. Él/ella → <em>fue</em>. Example: La fiesta fue divertida."
  },
  {
    category: "Irregular Verbs",
    question: "What is the <em>ellos</em> form of <em>ir</em> in the preterite?",
    options: ["fueron", "fuimos", "fuiste", "fue"],
    answer: 0,
    feedback: "Ellos/ustedes → <em>fueron</em>. Example: Mis amigos y yo fuimos; ellos fueron también."
  },
  {
    category: "Irregular Verbs",
    question: "What is the <em>yo</em> form of <em>ver</em> in the preterite?",
    options: ["vé", "ví", "vi", "vio"],
    answer: 2,
    feedback: "<em>Ver</em> is irregular: yo → <em>vi</em> (no accent mark)."
  },
  {
    category: "Irregular Verbs",
    question: "What is the <em>él/ella</em> form of <em>ver</em> in the preterite?",
    options: ["vió", "vio", "vi", "viste"],
    answer: 1,
    feedback: "<em>Ver</em>: él/ella → <em>vio</em> (no accent). Example: Juan vio la película."
  },
  {
    category: "Irregular Verbs",
    question: "What is the <em>yo</em> form of <em>dar</em> in the preterite?",
    options: ["dé", "dí", "di", "dio"],
    answer: 2,
    feedback: "<em>Dar</em> is irregular: yo → <em>di</em> (no accent mark)."
  },
  {
    category: "Irregular Verbs",
    question: "What is the <em>él/ella</em> form of <em>dar</em> in the preterite?",
    options: ["dó", "dió", "dio", "diste"],
    answer: 2,
    feedback: "<em>Dar</em>: él/ella → <em>dio</em> (no accent). Example: ¿Quién le dio el dinero?"
  },
  {
    category: "Irregular Verbs",
    question: "What is the <em>yo</em> form of <em>salir</em> in the preterite?",
    options: ["salé", "sali", "salí", "salió"],
    answer: 2,
    feedback: "<em>Salir</em> is regular in the preterite: yo → <em>salí</em>."
  },
  {
    category: "Irregular Verbs",
    question: "What is the <em>ellos</em> form of <em>volver</em> in the preterite?",
    options: ["volvaron", "volvieron", "volviron", "volvimos"],
    answer: 1,
    feedback: "<em>Volver</em>: ellos → <em>volvieron</em> (-ER verb)."
  },
  // === SENTENCE COMPREHENSION ===
  {
    category: "Preterite in Context",
    question: "What does <em>Ayer fui al supermercado</em> mean?",
    options: ["Today I go to the supermarket.", "Yesterday I went to the supermarket.", "Tomorrow I will go to the supermarket.", "I used to go to the supermarket."],
    answer: 1,
    feedback: "<em>Ayer</em> = yesterday, <em>fui</em> = I went (preterite of ir)."
  },
  {
    category: "Preterite in Context",
    question: "What does <em>La fiesta fue divertida</em> mean?",
    options: ["The party will be fun.", "The party is fun.", "The party was fun.", "The parties were fun."],
    answer: 2,
    feedback: "<em>Fue</em> is preterite of ser → was. La fiesta = the party (singular)."
  },
  {
    category: "Preterite in Context",
    question: "What does <em>Yo no salí anoche pero ellos salieron</em> mean?",
    options: ["I didn't leave last night but they left.", "I left last night but they didn't.", "I will not leave tonight but they will.", "We didn't leave last night."],
    answer: 0,
    feedback: "<em>No salí</em> = I didn't go out; <em>anoche</em> = last night; <em>salieron</em> = they went out."
  },
  {
    category: "Preterite in Context",
    question: "What does <em>Mis amigos y yo fuimos al cine</em> mean?",
    options: ["My friends and I are going to the movies.", "My friends and I went to the movies.", "My friends went to the movies without me.", "We will go to the movies."],
    answer: 1,
    feedback: "<em>Fuimos</em> is the nosotros preterite of ir → went."
  },
  // === ANSWERING QUESTIONS ===
  {
    category: "Question & Answer",
    question: "Best answer to: <em>¿Qué bebiste con el desayuno?</em>",
    options: ["Bebí leche.", "Fui al desayuno.", "Vi el desayuno.", "Me la bebí."],
    answer: 0,
    feedback: "<em>¿Qué bebiste?</em> asks what you drank. <em>Bebí leche</em> = I drank milk."
  },
  {
    category: "Question & Answer",
    question: "Best answer to: <em>¿A qué hora llegaste a la escuela?</em>",
    options: ["Llegué las ocho.", "Llegué a las ocho.", "Llegué en las ocho.", "Llegaste a las ocho."],
    answer: 1,
    feedback: "Use <em>a las</em> before a specific time: <em>Llegué a las ocho.</em>"
  },
  {
    category: "Question & Answer",
    question: "Best answer to: <em>¿Qué haces cuando hace buen tiempo?</em>",
    options: ["Fui a la piscina.", "Nadé en la piscina.", "Nado en la piscina.", "Yo nadar en la piscina."],
    answer: 2,
    feedback: "<em>¿Qué haces?</em> asks what you do (present tense habit), so answer in present: <em>Nado</em>."
  },
  {
    category: "Question & Answer",
    question: "<em>¿Fueron ustedes a la escuela ayer?</em> — What is this question asking?",
    options: ["Will you go to school tomorrow?", "Are you going to school now?", "Did you all go to school yesterday?", "Do you go to school every day?"],
    answer: 2,
    feedback: "<em>Fueron</em> = preterite of ir; <em>ayer</em> = yesterday; <em>ustedes</em> = you all."
  },
  // === VOCABULARY: WEATHER/WINTER ===
  {
    category: "Vocabulary",
    question: "What does <em>nublado</em> mean?",
    options: ["sunny", "snowy", "cloudy", "windy"],
    answer: 2,
    feedback: "<em>Nublado</em> = cloudy. Compare: <em>hace sol</em> = it is sunny."
  },
  {
    category: "Vocabulary",
    question: "What does <em>la nieve</em> mean?",
    options: ["the rain", "the ice", "the mountain", "the snow"],
    answer: 3,
    feedback: "<em>La nieve</em> = the snow."
  },
  {
    category: "Vocabulary",
    question: "What does <em>los anteojos de sol</em> mean?",
    options: ["ski goggles", "sunglasses", "sunscreen", "sunhat"],
    answer: 1,
    feedback: "<em>Los anteojos de sol</em> = sunglasses. Literally 'eye-glasses of the sun.'"
  },
  {
    category: "Vocabulary",
    question: "What does <em>la boletería</em> mean?",
    options: ["the ski slope", "the pool area", "the ticket booth", "the mountain trail"],
    answer: 2,
    feedback: "<em>La boletería</em> = ticket booth / box office."
  },
  {
    category: "Vocabulary",
    question: "What does <em>hace buen tiempo</em> mean?",
    options: ["the weather is bad", "it is cold", "the weather is good", "it is hot"],
    answer: 2,
    feedback: "<em>Hace buen tiempo</em> = the weather is good / it's nice outside."
  },
  {

let score = 0;
let answered = 0;
const total = questions.length;

function buildQuiz() {
  const wrap = document.getElementById('quizWrap');
  wrap.innerHTML = '';
  document.getElementById('totalDisplay').textContent = total;
  document.getElementById('scoreDisplay').textContent = 0;
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('resultsCard').classList.remove('show');
  score = 0;
  answered = 0;

  questions.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = `card-${i}`;

    const letters = ['A','B','C','D'];
    const optionsHTML = q.options.map((opt, j) => `
      <button class="option-btn" onclick="selectAnswer(${i}, ${j})" id="opt-${i}-${j}">
        <span class="opt-letter">${letters[j]}</span>
        ${opt}
      </button>
    `).join('');

    card.innerHTML = `
      <div class="q-number">Question ${i + 1} of ${total}</div>
      <div class="q-category">${q.category}</div>
      <div class="q-text">${q.question}</div>
      <div class="options">${optionsHTML}</div>
      <div class="feedback" id="fb-${i}"></div>
    `;
    wrap.appendChild(card);
  });
}

function selectAnswer(qIndex, chosenIndex) {
  const q = questions[qIndex];
  const card = document.getElementById(`card-${qIndex}`);

  // Disable all buttons for this question
  for (let j = 0; j < q.options.length; j++) {
    const btn = document.getElementById(`opt-${qIndex}-${j}`);
    btn.disabled = true;
  }

  const chosenBtn = document.getElementById(`opt-${qIndex}-${chosenIndex}`);
  const correctBtn = document.getElementById(`opt-${qIndex}-${q.answer}`);
  const fb = document.getElementById(`fb-${qIndex}`);

  if (chosenIndex === q.answer) {
    chosenBtn.classList.add('correct');
    card.classList.add('answered-correct');
    fb.textContent = '✓ Correct! ' + (q.feedback || '');
    fb.className = 'feedback show fb-correct';
    score++;
  } else {
    chosenBtn.classList.add('wrong');
    correctBtn.classList.add('reveal-correct');
    card.classList.add('answered-wrong');
    fb.innerHTML = '✗ Not quite. ' + (q.feedback || '');
    fb.className = 'feedback show fb-wrong';
  }

  answered++;
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('progressFill').style.width = `${(answered / total) * 100}%`;

  if (answered === total) {
    setTimeout(showResults, 600);
  }
}

function showResults() {
  const card = document.getElementById('resultsCard');
  const pct = Math.round((score / total) * 100);
  document.getElementById('bigScore').textContent = `${score} / ${total}`;
  let msg = '';
  if (pct === 100) msg = '¡Perfecto! Incredible — you nailed every question.';
  else if (pct >= 85) msg = '¡Muy bien! You really know your stuff.';
  else if (pct >= 70) msg = '¡Bien! Solid work — review the ones you missed.';
  else if (pct >= 50) msg = 'Keep studying! Focus on the feedback for missed questions.';
  else msg = 'Don\'t give up — review the guide and try again!';
  document.getElementById('resultMsg').textContent = msg;
  card.classList.add('show');
  card.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function restartQuiz() {
  buildQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();

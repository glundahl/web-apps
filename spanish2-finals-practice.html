<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spanish 2 Finals Practice</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2330;
    --border: #30363d;
    --accent: #ff6b35;
    --accent2: #58a6ff;
    --accent3: #f78166;
    --accent4: #d2a8ff;
    --text: #e6edf3;
    --text-muted: #7d8590;
    --text-dim: #484f58;
    --correct: #1a4d2e;
    --correct-border: #3fb950;
    --wrong: #4d1a1a;
    --wrong-border: #f78166;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
    border-bottom: 1px solid var(--border);
    padding: 40px 20px 30px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 70% 80% at 50% -20%, rgba(255,107,53,.13) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }
  .header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(26px, 5vw, 44px);
    font-weight: 800;
    line-height: 1.1;
    color: var(--text);
  }
  .header h1 span { color: var(--accent); }
  .header-sub {
    margin-top: 10px;
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 300;
  }
  .pill-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 18px;
  }
  .pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--text-muted);
  }

  /* ── PROGRESS BAR ── */
  .progress-wrap {
    max-width: 760px;
    margin: 24px auto 0;
    padding: 0 20px;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .progress-track {
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width .4s ease;
    width: 0%;
  }

  /* ── SCORE CARD ── */
  .score-card {
    max-width: 760px;
    margin: 16px auto 0;
    padding: 0 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .score-item {
    flex: 1;
    min-width: 100px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    text-align: center;
  }
  .score-item .num {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 700;
  }
  .score-item .lbl { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .score-item.correct .num { color: #3fb950; }
  .score-item.wrong .num { color: var(--accent3); }
  .score-item.pct .num { color: var(--accent2); }

  /* ── SECTION TABS ── */
  .tabs {
    max-width: 760px;
    margin: 24px auto 0;
    padding: 0 20px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .tab-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all .2s;
  }
  .tab-btn:hover { border-color: var(--accent2); color: var(--text); }
  .tab-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0d1117;
    font-weight: 600;
  }

  /* ── QUIZ AREA ── */
  .quiz-area {
    max-width: 760px;
    margin: 20px auto 0;
    padding: 0 20px;
  }

  /* ── QUESTION CARD ── */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 14px;
    transition: border-color .3s;
    animation: fadeSlide .35s ease both;
  }
  @keyframes fadeSlide {
    from { opacity:0; transform: translateY(12px); }
    to   { opacity:1; transform: translateY(0); }
  }
  .q-card.answered { border-color: var(--border); }

  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 16px;
  }
  .q-num {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 8px;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .q-text {
    font-size: 15px;
    font-weight: 500;
    line-height: 1.5;
    color: var(--text);
  }
  .q-chapter {
    font-size: 10px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  /* ── ANSWER OPTIONS ── */
  .options { display: flex; flex-direction: column; gap: 8px; }

  .opt {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    cursor: pointer;
    transition: all .18s;
    font-size: 14px;
    line-height: 1.45;
    color: var(--text);
    text-align: left;
    width: 100%;
    font-family: 'DM Sans', sans-serif;
  }
  .opt:hover:not(:disabled) {
    border-color: var(--accent);
    background: #1f1a14;
    transform: translateX(2px);
  }
  .opt:disabled { cursor: default; transform: none; }

  .opt-letter {
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    transition: all .18s;
    margin-top: 1px;
  }
  .opt:hover:not(:disabled) .opt-letter {
    background: var(--accent);
    color: #fff;
  }

  /* Correct / Wrong states */
  .opt.correct-pick {
    background: var(--correct);
    border-color: var(--correct-border);
    color: #aff5b4;
  }
  .opt.correct-pick .opt-letter { background: #3fb950; color: #0d1117; }

  .opt.wrong-pick {
    background: var(--wrong);
    border-color: var(--wrong-border);
    color: #ffa198;
  }
  .opt.wrong-pick .opt-letter { background: var(--accent3); color: #fff; }

  .opt.reveal-correct {
    background: rgba(63,185,80,.08);
    border-color: rgba(63,185,80,.4);
    color: #aff5b4;
  }
  .opt.reveal-correct .opt-letter { background: rgba(63,185,80,.3); color: #3fb950; }

  /* ── EXPLANATION ── */
  .explanation {
    display: none;
    margin-top: 12px;
    padding: 12px 14px;
    background: rgba(255,107,53,.07);
    border: 1px solid rgba(255,107,53,.2);
    border-radius: var(--radius);
    font-size: 13px;
    color: #ffcdb8;
    line-height: 1.55;
  }
  .explanation.show { display: block; }
  .explanation strong { color: var(--accent); }

  /* ── SECTION HEADER ── */
  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 28px 0 14px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--text-muted);
  }
  .section-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .section-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── CONTROLS ── */
  .controls {
    max-width: 760px;
    margin: 28px auto 0;
    padding: 0 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .btn {
    padding: 10px 22px;
    border-radius: var(--radius);
    border: none;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .04em;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-primary {
    background: var(--accent);
    color: #0d1117;
  }
  .btn-primary:hover { background: #ff8559; transform: translateY(-1px); }
  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--accent2); transform: translateY(-1px); }

  /* ── FINAL RESULTS ── */
  #results-screen {
    display: none;
    max-width: 760px;
    margin: 30px auto;
    padding: 0 20px;
    text-align: center;
  }
  .results-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 30px;
  }
  .results-grade {
    font-family: 'Syne', sans-serif;
    font-size: 72px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 8px;
  }
  .results-label {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 28px;
  }
  .results-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }
  .results-stat {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .results-stat .n {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 700;
  }
  .results-stat .l { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

  .missed-list {
    text-align: left;
    margin-top: 20px;
  }
  .missed-list h3 {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--accent3);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .missed-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 6px;
    line-height: 1.4;
  }
  .missed-item span { color: var(--text); }

  /* mobile tweaks */
  @media(max-width:520px){
    .score-item { min-width: 80px; padding: 10px; }
    .score-item .num { font-size: 20px; }
    .q-card { padding: 18px; }
    .opt { font-size: 13px; padding: 10px 12px; }
    .results-grade { font-size: 56px; }
    .results-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-label">Finals Practice</div>
  <h1>Spanish 2 <span>Quiz</span></h1>
  <div class="header-sub">Preterite Tense · Direct Object Pronouns · Vocabulary</div>
  <div class="pill-row">
    <span class="pill">55 Questions</span>
    <span class="pill">Multiple Choice</span>
    <span class="pill">Instant Feedback</span>
  </div>
</div>

<!-- PROGRESS -->
<div class="progress-wrap">
  <div class="progress-meta">
    <span id="prog-label">0 of 55 answered</span>
    <span id="prog-pct">0%</span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div>
</div>

<!-- SCORE CARD -->
<div class="score-card">
  <div class="score-item correct"><div class="num" id="sc-correct">0</div><div class="lbl">Correct</div></div>
  <div class="score-item wrong"><div class="num" id="sc-wrong">0</div><div class="lbl">Incorrect</div></div>
  <div class="score-item pct"><div class="num" id="sc-pct">—</div><div class="lbl">Score</div></div>
</div>

<!-- SECTION TABS -->
<div class="tabs">
  <button class="tab-btn active" onclick="filterSection('all',this)">All Questions</button>
  <button class="tab-btn" onclick="filterSection('pronouns',this)">Object Pronouns</button>
  <button class="tab-btn" onclick="filterSection('preterite',this)">Preterite</button>
  <button class="tab-btn" onclick="filterSection('irregular',this)">Irregulars</button>
  <button class="tab-btn" onclick="filterSection('vocab',this)">Vocabulary</button>
</div>

<!-- QUIZ AREA -->
<div class="quiz-area" id="quiz-area"></div>

<!-- CONTROLS -->
<div class="controls">
  <button class="btn btn-primary" onclick="showResults()">See Final Score</button>
  <button class="btn btn-secondary" onclick="resetQuiz()">Reset Quiz</button>
</div>

<!-- RESULTS SCREEN -->
<div id="results-screen">
  <div class="results-box">
    <div class="results-grade" id="r-grade">—</div>
    <div class="results-label" id="r-label">calculating…</div>
    <div class="results-grid">
      <div class="results-stat"><div class="n" id="r-correct" style="color:#3fb950">0</div><div class="l">Correct</div></div>
      <div class="results-stat"><div class="n" id="r-wrong" style="color:var(--accent3)">0</div><div class="l">Incorrect</div></div>
      <div class="results-stat"><div class="n" id="r-skip" style="color:var(--text-muted)">0</div><div class="l">Skipped</div></div>
    </div>
    <div class="missed-list" id="missed-list"></div>
    <button class="btn btn-primary" style="margin-top:24px;width:100%" onclick="resetQuiz()">Retake Quiz</button>
  </div>
</div>

<script>
const ALL_QUESTIONS = [
  // === DIRECT OBJECT PRONOUNS ===
  {section:'pronouns', q:"What does the direct object pronoun <em>la</em> mean?",
   opts:[{t:"him / it (masculine)",correct:false},{t:"her / it (feminine)",correct:true},{t:"them (masculine plural)",correct:false},{t:"them (feminine plural)",correct:false}],
   explain:"<em>La</em> replaces a feminine singular noun. Example: La película → la miro."},
  {section:'pronouns', q:"What does the direct object pronoun <em>los</em> mean?",
   opts:[{t:"him / it (masculine)",correct:false},{t:"her / it (feminine)",correct:false},{t:"them (masculine or mixed plural)",correct:true},{t:"them (feminine plural)",correct:false}],
   explain:"<em>Los</em> replaces masculine or mixed plural nouns. Example: los cuadernos → los tengo."},
  {section:'pronouns', q:"Which pronoun replaces <em>las fotos</em>?",
   opts:[{t:"lo",correct:false},{t:"la",correct:false},{t:"los",correct:false},{t:"las",correct:true}],
   explain:"<em>Las fotos</em> is feminine plural, so the pronoun is <em>las</em>."},
  {section:'pronouns', q:"Which pronoun replaces <em>el helado</em>?",
   opts:[{t:"lo",correct:true},{t:"la",correct:false},{t:"los",correct:false},{t:"las",correct:false}],
   explain:"<em>El helado</em> is masculine singular → <em>lo</em>."},
  {section:'pronouns', q:"Which pronoun replaces <em>la ropa</em>?",
   opts:[{t:"lo",correct:false},{t:"la",correct:true},{t:"los",correct:false},{t:"las",correct:false}],
   explain:"<em>La ropa</em> is feminine singular → <em>la</em>."},
  {section:'pronouns', q:"Which pronoun replaces <em>los guantes</em>?",
   opts:[{t:"lo",correct:false},{t:"la",correct:false},{t:"los",correct:true},{t:"las",correct:false}],
   explain:"<em>Los guantes</em> is masculine plural → <em>los</em>."},
  {section:'pronouns', q:"Rewrite: <em>Ellos escucharon la música.</em>",
   opts:[{t:"Ellos lo escucharon.",correct:false},{t:"Ellos la escucharon.",correct:true},{t:"Ellos las escucharon.",correct:false},{t:"Ellos los escucharon.",correct:false}],
   explain:"<em>La música</em> is feminine singular → <em>la</em>. The pronoun goes before the conjugated verb."},
  {section:'pronouns', q:"Rewrite: <em>Carlos preparó la comida.</em>",
   opts:[{t:"Carlos lo preparó.",correct:false},{t:"Carlos los preparó.",correct:false},{t:"Carlos la preparó.",correct:true},{t:"Carlos las preparó.",correct:false}],
   explain:"<em>La comida</em> is feminine singular → <em>la</em>."},
  {section:'pronouns', q:"Rewrite: <em>¿Dónde compraste los guantes?</em>",
   opts:[{t:"¿Dónde la compraste?",correct:false},{t:"¿Dónde lo compraste?",correct:false},{t:"¿Dónde las compraste?",correct:false},{t:"¿Dónde los compraste?",correct:true}],
   explain:"<em>Los guantes</em> is masculine plural → <em>los</em>."},
  {section:'pronouns', q:"Rewrite: <em>Yo miré las fotos.</em>",
   opts:[{t:"Yo lo miré.",correct:false},{t:"Yo la miré.",correct:false},{t:"Yo las miré.",correct:true},{t:"Yo los miré.",correct:false}],
   explain:"<em>Las fotos</em> is feminine plural → <em>las</em>."},
  {section:'pronouns', q:"Rewrite: <em>Llevo los refrescos.</em>",
   opts:[{t:"La llevo.",correct:false},{t:"Lo llevo.",correct:false},{t:"Las llevo.",correct:false},{t:"Los llevo.",correct:true}],
   explain:"<em>Los refrescos</em> is masculine plural → <em>los</em>."},

  // === PRETERITE REGULAR -AR ===
  {section:'preterite', q:"What is the <em>yo</em> form of <em>hablar</em> in the preterite?",
   opts:[{t:"hablí",correct:false},{t:"hablé",correct:true},{t:"hablaste",correct:false},{t:"hablamos",correct:false}],
   explain:"Regular -AR verbs take <em>é</em> for the <em>yo</em> form: hablé."},
  {section:'preterite', q:"What is the <em>él/ella</em> form of <em>estudiar</em> in the preterite?",
   opts:[{t:"estudié",correct:false},{t:"estudiaste",correct:false},{t:"estudió",correct:true},{t:"estudiaron",correct:false}],
   explain:"Regular -AR, él/ella ending: <em>ó</em> → estudió."},
  {section:'preterite', q:"What is the <em>ustedes/ellos</em> form of <em>regresar</em> in the preterite?",
   opts:[{t:"regresé",correct:false},{t:"regresaron",correct:true},{t:"regresimos",correct:false},{t:"regresieron",correct:false}],
   explain:"Regular -AR, ellos/ustedes ending: <em>aron</em> → regresaron."},
  {section:'preterite', q:"What is the <em>tú</em> form of <em>caminar</em> in the preterite?",
   opts:[{t:"caminé",correct:false},{t:"caminaste",correct:true},{t:"caministe",correct:false},{t:"caminó",correct:false}],
   explain:"Regular -AR, tú ending: <em>aste</em> → caminaste."},
  {section:'preterite', q:"What is the <em>nosotros</em> form of <em>pasar</em> in the preterite?",
   opts:[{t:"pasé",correct:false},{t:"pasamos",correct:true},{t:"pasimos",correct:false},{t:"pasaron",correct:false}],
   explain:"Regular -AR, nosotros ending: <em>amos</em> → pasamos."},

  // === PRETERITE REGULAR -ER/-IR ===
  {section:'preterite', q:"What is the <em>yo</em> form of <em>comer</em> in the preterite?",
   opts:[{t:"comé",correct:false},{t:"comí",correct:true},{t:"comiste",correct:false},{t:"comió",correct:false}],
   explain:"Regular -ER verbs take <em>í</em> for the yo form: comí."},
  {section:'preterite', q:"What is the <em>tú</em> form of <em>vivir</em> in the preterite?",
   opts:[{t:"vivaste",correct:false},{t:"viviste",correct:true},{t:"vivió",correct:false},{t:"viví",correct:false}],
   explain:"Regular -IR, tú ending: <em>iste</em> → viviste."},
  {section:'preterite', q:"What is the <em>ellos/ustedes</em> form of <em>beber</em> in the preterite?",
   opts:[{t:"bebaron",correct:false},{t:"bebieron",correct:true},{t:"bebimos",correct:false},{t:"bebiste",correct:false}],
   explain:"Regular -ER, ellos ending: <em>ieron</em> → bebieron."},
  {section:'preterite', q:"What is the <em>nosotros</em> form of <em>asistir</em> in the preterite?",
   opts:[{t:"asistamos",correct:false},{t:"asistimos",correct:true},{t:"asistieron",correct:false},{t:"asististe",correct:false}],
   explain:"Regular -IR, nosotros ending: <em>imos</em> → asistimos."},
  {section:'preterite', q:"What is the <em>él/ella</em> form of <em>compartir</em> in the preterite?",
   opts:[{t:"compartó",correct:false},{t:"compartió",correct:true},{t:"compartiste",correct:false},{t:"compartimos",correct:false}],
   explain:"Regular -IR, él/ella ending: <em>ió</em> → compartió."},

  // === ENDINGS DISTINCTION ===
  {section:'preterite', q:"Which ending is correct for <em>yo</em> with a regular <em>-ER</em> verb?",
   opts:[{t:"é",correct:false},{t:"í",correct:true},{t:"ó",correct:false},{t:"imos",correct:false}],
   explain:"-ER and -IR verbs use <em>í</em> for yo. Only -AR verbs use <em>é</em>."},
  {section:'preterite', q:"Which ending is correct for <em>ellos</em> with a regular <em>-AR</em> verb?",
   opts:[{t:"ieron",correct:false},{t:"aron",correct:true},{t:"imos",correct:false},{t:"amos",correct:false}],
   explain:"-AR verbs use <em>aron</em> for ellos/ustedes. -ER/-IR verbs use <em>ieron</em>."},

// ──────────────────────────────────────────────
// STATE
// ──────────────────────────────────────────────
let answers = {};
let currentSection = 'all';

const SECTIONS = [
  {key:'pronouns',  label:'Direct Object Pronouns', color:'#ff6b35'},
  {key:'preterite', label:'Preterite Tense',         color:'#58a6ff'},
  {key:'irregular', label:'Irregular Verbs',          color:'#d2a8ff'},
  {key:'vocab',     label:'Vocabulary',               color:'#ffd166'},
];

// ──────────────────────────────────────────────
// BUILD QUIZ
// ──────────────────────────────────────────────
function buildQuiz() {
  const area = document.getElementById('quiz-area');
  area.innerHTML = '';

  let globalIdx = 0;

  SECTIONS.forEach(sec => {
    const qs = ALL_QUESTIONS.map((q,i)=>({...q,idx:i})).filter(q=>q.section===sec.key);
    if(currentSection !== 'all' && currentSection !== sec.key) return;

    const sh = document.createElement('div');
    sh.className = 'section-header';
    sh.innerHTML = `<span class="section-dot" style="background:${sec.color}"></span>${sec.label}`;
    area.appendChild(sh);

    qs.forEach(q => {
      const card = document.createElement('div');
      card.className = 'q-card';
      card.id = `card-${q.idx}`;
      if(answers[q.idx]) card.classList.add('answered');

      const shuffled = shuffleOpts(q.opts);

      let optsHTML = shuffled.map((opt, i) => {
        let cls = 'opt';
        const st = answers[q.idx];
        if(st) {
          if(i === st.chosen && st.correct) cls += ' correct-pick';
          else if(i === st.chosen && !st.correct) cls += ' wrong-pick';
          else if(opt.correct && !st.correct) cls += ' reveal-correct';
        }
        const letters = ['A','B','C','D'];
        return `<button class="${cls}" onclick="pick(${q.idx},${i},this)" ${answers[q.idx]?'disabled':''}>
          <span class="opt-letter">${letters[i]}</span>${opt.t}
        </button>`;
      }).join('');

      const expShow = answers[q.idx] ? 'show' : '';
      card.innerHTML = `
        <div class="q-header">
          <span class="q-num">Q${q.idx+1}</span>
          <div><div class="q-chapter">${sec.label}</div><div class="q-text">${q.q}</div></div>
        </div>
        <div class="options" id="opts-${q.idx}">${optsHTML}</div>
        <div class="explanation ${expShow}" id="exp-${q.idx}"><strong>Explanation:</strong> ${q.explain}</div>
      `;

      card.dataset.shuffled = JSON.stringify(shuffled.map(o=>o.correct));
      area.appendChild(card);
    });
  });
  updateProgress();
}

function shuffleOpts(opts) {
  const arr = [...opts];
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

// ──────────────────────────────────────────────
// PICK ANSWER
// ──────────────────────────────────────────────
function pick(qIdx, chosenIdx, btn) {
  if(answers[qIdx]) return;

  const card = document.getElementById(`card-${qIdx}`);
  const shuffledCorrects = JSON.parse(card.dataset.shuffled);
  const isCorrect = shuffledCorrects[chosenIdx];

  answers[qIdx] = {chosen: chosenIdx, correct: isCorrect};

  const optBtns = card.querySelectorAll('.opt');
  optBtns.forEach((b,i)=>{
    b.disabled = true;
    if(i===chosenIdx && isCorrect) b.classList.add('correct-pick');
    else if(i===chosenIdx && !isCorrect) b.classList.add('wrong-pick');
    else if(shuffledCorrects[i] && !isCorrect) b.classList.add('reveal-correct');
  });

  document.getElementById(`exp-${qIdx}`).classList.add('show');
  card.classList.add('answered');
  updateProgress();
}

// ──────────────────────────────────────────────
// PROGRESS / SCORE
// ──────────────────────────────────────────────
function updateProgress() {
  const total = ALL_QUESTIONS.length;
  const answered = Object.keys(answers).length;
  const correct = Object.values(answers).filter(a=>a.correct).length;
  const wrong = answered - correct;

  document.getElementById('prog-label').textContent = `${answered} of ${total} answered`;
  const pct = Math.round((answered/total)*100);
  document.getElementById('prog-pct').textContent = pct+'%';
  document.getElementById('prog-fill').style.width = pct+'%';

  document.getElementById('sc-correct').textContent = correct;
  document.getElementById('sc-wrong').textContent = wrong;
  if(answered>0){
    document.getElementById('sc-pct').textContent = Math.round((correct/answered)*100)+'%';
  } else {
    document.getElementById('sc-pct').textContent = '—';
  }
}

// ──────────────────────────────────────────────
// SECTION FILTER
// ──────────────────────────────────────────────
function filterSection(sec, btn) {
  currentSection = sec;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  buildQuiz();
}

// ──────────────────────────────────────────────
// SHOW RESULTS
// ──────────────────────────────────────────────
function showResults() {
  const total = ALL_QUESTIONS.length;
  const answered = Object.keys(answers).length;
  const correct = Object.values(answers).filter(a=>a.correct).length;
  const wrong = Object.values(answers).filter(a=>!a.correct).length;
  const skipped = total - answered;
  const pct = Math.round((correct/total)*100);

  let grade, color;
  if(pct>=90){grade='A';color='#3fb950';}
  else if(pct>=80){grade='B';color='var(--accent2)';}
  else if(pct>=70){grade='C';color:'#e3b341';}
  else if(pct>=60){grade='D';color='var(--accent3)';}
  else{grade='F';color='var(--accent3)';}

  document.getElementById('r-grade').textContent = pct+'%';
  document.getElementById('r-grade').style.color = color;
  document.getElementById('r-label').textContent = `Grade: ${grade} · ${correct} correct out of ${total} questions`;
  document.getElementById('r-correct').textContent = correct;
  document.getElementById('r-wrong').textContent = wrong;
  document.getElementById('r-skip').textContent = skipped;

  const missedEl = document.getElementById('missed-list');
  const missed = ALL_QUESTIONS.map((q,i)=>({...q,idx:i}))
    .filter(q=>answers[q.idx] && !answers[q.idx].correct);

  if(missed.length){
    missedEl.innerHTML = `<h3>Review These (${missed.length})</h3>` +
      missed.map(q=>`<div class="missed-item">Q${q.idx+1}: <span>${q.q}</span></div>`).join('');
  } else if(answered===total){
    missedEl.innerHTML = `<div style="color:#3fb950;font-size:15px;text-align:center;margin-top:8px">🎉 ¡Perfecto! All questions answered correctly!</div>`;
  } else {
    missedEl.innerHTML = '';
  }

  document.getElementById('results-screen').style.display = 'block';
  document.getElementById('results-screen').scrollIntoView({behavior:'smooth'});
}

// ──────────────────────────────────────────────
// RESET
// ──────────────────────────────────────────────
function resetQuiz() {
  answers = {};
  document.getElementById('results-screen').style.display = 'none';
  buildQuiz();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── INIT ──
buildQuiz();
</script>
